name: Delete Unstable Version Workflow

on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
        description: 'API name'
      execution:
        required: true
        type: string
        description: 'Execution profile (e.g. server, client)'
      ticket:
        required: true
        type: string
        description: 'Ticket string (e.g. sitionix)'
      issue_number:
        required: false
        type: number
        description: 'Issue or PR number (optional)'
    secrets:
      APP_AFESOX:
        required: true

jobs:
  delete:
    name: Delete Unstable Package
    runs-on: ubuntu-latest
    steps:
      - name: Construct artifactId from inputs
        if: endsWith(inputs.ticket, '-unstable')
        id: build-artifact-id
        run: |
          ARTIFACT_ID="app-afesox-${{ inputs.name }}-${{ inputs.execution }}-${{ inputs.ticket }}"
          echo "artifact_id=$ARTIFACT_ID" >> $GITHUB_OUTPUT

      - name: Retrieve package owner from GitHub context
        if: endsWith(inputs.ticket, '-unstable')
        id: resolve-owner
        run: echo "owner=${{ github.repository_owner }}" >> $GITHUB_OUTPUT

      - name: Delete entire package via GitHub API
        if: endsWith(inputs.ticket, '-unstable')
        env:
          GH_TOKEN: ${{ secrets.APP_AFESOX }}
          ARTIFACT_ID: ${{ steps.build-artifact-id.outputs.artifact_id }}
          PACKAGE_OWNER: ${{ steps.resolve-owner.outputs.owner }}
        run: |
          GROUP_ID="com.afesox"
          PACKAGE_NAME="$GROUP_ID.$ARTIFACT_ID"
          echo "Deleting entire package: $PACKAGE_NAME"

          RESPONSE=$(gh api \
            --method DELETE \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "/users/$PACKAGE_OWNER/packages/maven/$PACKAGE_NAME" 2>&1)

          echo "$RESPONSE"

          if echo "$RESPONSE" | grep -q '404'; then
            echo "Package not found, skipping delete."
            exit 0
          fi

  notify-failure:
    name: Delete failure comment
    if: failure()
    needs: delete
    runs-on: ubuntu-latest
    steps:
      - name: Post comment to PR
        uses: actions/github-script@v6
        with:
          script: |
            const issue_number = ${{ inputs.issue_number }};
            if (!issue_number) {
              console.log('No issue number provided, skipping comment.');
              return;
            }

            const run_id = process.env.GITHUB_RUN_ID;
            const repo = context.repo;
            const workflow_run_url = `https://github.com/${repo.owner}/${repo.repo}/actions/runs/${run_id}`;

            const body = [
              '---',
              '### ❌ Delete Job Failed',
              '',
              '> ⚠️ **The delete job could not be completed.**',
              '',
              `🔍 [View Workflow Run Logs](${workflow_run_url})`,
              '---'
            ].join('\n');

            await github.rest.issues.createComment({
              ...repo,
              issue_number,
              body
            });
