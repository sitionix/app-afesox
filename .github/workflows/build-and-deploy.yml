name: Build and Deploy

on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      version:
        required: true
        type: string
      execution:
        required: true
        type: string
      variant:
        required: false
        type: string
        default: stable
      issue_number:
        required: false
        type: number
      ref:
        required: false
        type: string
    secrets:
      APP_AFESOX:
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy (${{ inputs.name }} - ${{ inputs.execution }} - ${{ inputs.version }})
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.sha }}
      - name: Log deploy/build source
        run: |
          echo "DEPLOY_REF_INPUT=${{ inputs.ref }}"
          echo "GITHUB_SHA=${{ github.sha }}"
          echo "GITHUB_REF=${{ github.ref }}"
          echo "CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)"
          echo "CURRENT_SHA=$(git rev-parse HEAD)"
          REMOTE_BRANCH=$(git branch -r --contains HEAD | head -n1 | xargs)
          echo "REMOTE_BRANCH=${REMOTE_BRANCH}"
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache OpenAPI Generator
        uses: actions/cache@v3
        with:
          path: ~/.openapi-generator
          key: openapi-${{ hashFiles('**/openapi-rest.yml') }}

      - name: Setup Maven settings
        run: |
          mkdir -p ~/.m2
          echo "<settings>
                  <servers>
                    <server>
                      <id>github</id>
                      <username>${{ github.actor }}</username>
                      <password>${{ secrets.APP_AFESOX }}</password>
                    </server>
                  </servers>
                </settings>" > ~/.m2/settings.xml

      - name: Set dynamic environment variables
        run: |
          echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          echo "ARTIFACT_ID=app-afesox-${{ inputs.name }}-${{ inputs.execution }}-${{ inputs.variant }}" >> $GITHUB_ENV
          echo "NAME=${{ inputs.name }}" >> $GITHUB_ENV
          echo "EXECUTION=${{ inputs.execution }}" >> $GITHUB_ENV
          echo "VARIANT=${{ inputs.variant }}" >> $GITHUB_ENV

      - name: Build and Deploy
        run: |
          echo "::group::🔧 Building $NAME ($EXECUTION) - version $VERSION with artifact ID $ARTIFACT_ID"
          set -euo pipefail

          mvn clean deploy -P$EXECUTION \
            -Dproject.version=$VERSION \
            -DARTIFACT_ID=$ARTIFACT_ID \
            -DVERSION=$VERSION \
            -DNAME=$NAME \
            -DVARIANT=$VARIANT
          echo "::endgroup::"

  notify-failure:
    name: Deploy notify failure
    if: failure()
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Post comment to PR
        uses: actions/github-script@v6
        with:
          script: |
            const issue_number = ${{ inputs.issue_number }};
            if (!issue_number) return;
            const run_id = process.env.GITHUB_RUN_ID;
            const repo = context.repo;
            const workflow_run_url = `https://github.com/${repo.owner}/${repo.repo}/actions/runs/${run_id}`;

            const body = [
              '---',
              '### ❌ Deploy Job Failed',
              '',
              '> ⚠️ **The deploy job could not be completed.**',
              '',
              `🔍 [View Workflow Run Logs](${workflow_run_url})`,
              '---'
            ].join('\n');

            await github.rest.issues.createComment({
              ...repo,
              issue_number,
              body
            });

  notify-success:
    name: Deploy success message
    if: success()
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Post comment to PR
        uses: actions/github-script@v6
        with:
          script: |
            const issue_number = ${{ inputs.issue_number }};
            if (!issue_number) return;
            const run_id = process.env.GITHUB_RUN_ID;
            const repo = context.repo;
            const workflow_run_url = `https://github.com/${repo.owner}/${repo.repo}/actions/runs/${run_id}`;

            const groupId = "com.afesox";
            const artifactId = `app-afesox-${{ inputs.name }}-${{ inputs.execution }}-${{ inputs.variant }}`;
            const version = `${{ inputs.version }}`;

            const body = [
              '---',
              '### ✅🎉 Deployment Successful! 🎉✅',
              '',
              '<details>',
              '<summary>📦 Maven Dependency Snippet</summary>',
              '',
              '```xml',
              '<dependency>',
              `  <groupId>${groupId}</groupId>`,
              `  <artifactId>${artifactId}</artifactId>`,
              `  <version>${version}</version>`,
              '</dependency>',
              '```',
              '</details>',
              '',
              `🔗 [View Workflow Run](${workflow_run_url})`,
              '---'
            ].join('\n');

            await github.rest.issues.createComment({
              ...repo,
              issue_number,
              body
            });

