name: Delete Unstable Event Version

on:
  workflow_call:
    inputs:
      event_service:
        required: true
        type: string
      event_name:
        required: true
        type: string
      execution:
        required: true
        type: string
      ticket:
        required: true
        type: string
      issue_number:
        required: false
        type: number
    secrets:
      APP_AFESOX:
        required: true

jobs:
  delete-unstable-event:
    runs-on: ubuntu-latest
    steps:
      - name: Delete event package
        run: |
          event_exec=$(echo "${{ inputs.execution }}" | sed 's/^event-//')
          ARTIFACT_ID="app-afesox-${{ inputs.event_service }}-event-${{ inputs.event_name }}-${event_exec}-${{ inputs.ticket }}"
          curl -X DELETE -H "Authorization: token ${{ secrets.APP_AFESOX }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/user/packages/maven/com.afesox.$ARTIFACT_ID"

      - name: Post Success Comment
        if: success()
        uses: actions/github-script@v6
        with:
          script: |
            const issue_number = ${{ inputs.issue_number }};
            if (!issue_number) return;
            const comment_body = `
            ### Event Dependency Successfully Removed
            - **Job Status:** Success
            - The Maven dependency has been successfully removed from the repository.
            `;
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issue_number,
              body: comment_body,
            });
