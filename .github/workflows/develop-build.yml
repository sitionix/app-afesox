name: Maven CI for Develop

on:
  push:
    branches:
      - develop

jobs:
  detect:
    uses: ./.github/workflows/detect-metadata-changes.yml

  build-and-deploy:
    needs: detect
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    if: ${{ needs.detect.outputs.changed != 'none' && matrix.kind == 'api' }}
    uses: ./.github/workflows/build-and-deploy.yml
    with:
      name: ${{ matrix.name }}
      version: ${{ matrix.version }}
      execution: ${{ matrix.execution }}
      variant: stable
    secrets:
      APP_AFESOX: ${{ secrets.APP_AFESOX }}

  build-and-deploy-event:
    needs: detect
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    if: ${{ needs.detect.outputs.changed != 'none' && matrix.kind == 'event' }}
    uses: ./.github/workflows/build-and-deploy-event.yml
    with:
      name: ${{ matrix.name }}
      version: ${{ matrix.version }}
      execution: ${{ matrix.execution }}
      event_service: ${{ matrix.event_service }}
      event_name: ${{ matrix.event_name }}
      event_tag: ${{ matrix.event_tag }}
      event_wrapper_package: com.app_afesox.${{ matrix.event_service }}.events.${{ matrix.event_name }}.kafka
      variant: stable
    secrets:
      APP_AFESOX: ${{ secrets.APP_AFESOX }}
