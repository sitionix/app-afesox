name: Maven CI for Develop

on:
  push:
    branches:
      - develop

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.set_outputs.outputs.changed }}
      matrix: ${{ steps.set_outputs.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install yq and jq
        run: |
          wget https://github.com/mikefarah/yq/releases/download/v4.43.1/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          sudo apt-get update && sudo apt-get install -y jq

      - name: Detect changed metadata.yml files
        id: set_outputs
        run: |
          git fetch origin develop --depth=2

          BASE=$(git rev-parse origin/develop^)
          HEAD=$(git rev-parse origin/develop)

          CHANGED=$(git diff --name-only --diff-filter=AM $BASE $HEAD | grep 'metadata.yml' | grep -v '^.github/' || true)

          if [ -z "$CHANGED" ]; then
            echo "::error:: 🛑 No metadata.yml changed. Nothing to build or deploy."
            echo "changed=none" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "$CHANGED" > changed_files.txt
          echo "changed=true" >> $GITHUB_OUTPUT

          MATRIX_ITEMS="[]"
          while IFS= read -r FILE; do
            VERSION=$(yq e '.api.version' "$FILE")
            NAME=$(yq e '.api.name' "$FILE")
            EXECUTIONS=$(yq e '.api.executions[].type' "$FILE")
            for EXEC in $EXECUTIONS; do
              MATRIX_ITEMS=$(echo "$MATRIX_ITEMS" | jq --arg name "$NAME" --arg execution "$EXEC" --arg version "$VERSION" '. + [{name: $name, execution: $execution, version: $version}]')
            done
          done < changed_files.txt

          echo "matrix=$(echo "$MATRIX_ITEMS" | jq -c '{include: .}')" >> $GITHUB_OUTPUT

      - name: Upload changed files
        if: steps.set_outputs.outputs.changed != 'none'
        uses: actions/upload-artifact@v4
        with:
          name: changed-files
          path: changed_files.txt

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.changed != 'none'
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    name: Build and Deploy (${{ matrix.name }} - ${{ matrix.execution }})
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download changed files
        uses: actions/download-artifact@v4
        with:
          name: changed-files
          path: .

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache OpenAPI Generator
        uses: actions/cache@v3
        with:
          path: ~/.openapi-generator
          key: openapi-${{ hashFiles('**/openapi-rest.yml') }}

      - name: Setup Maven settings
        run: |
          mkdir -p ~/.m2
          echo "<settings>
                  <servers>
                    <server>
                      <id>github</id>
                      <username>${{ github.actor }}</username>
                      <password>${{ secrets.APP_AFESOX }}</password>
                    </server>
                  </servers>
                </settings>" > ~/.m2/settings.xml

      - name: Build and Deploy
        run: |
          echo "🔧 Building ${{ matrix.name }} (${{ matrix.execution }}) - version ${{ matrix.version }}"
          mvn --file apis/${{ matrix.name }}/${{ matrix.execution }}/pom.xml clean deploy -P${{ matrix.execution }} || \
          mvn --file app-${{ matrix.name }}/pom.xml clean deploy -P${{ matrix.execution }} || \
          echo "No valid pom.xml found for ${{ matrix.name }} - ${{ matrix.execution }}"
