name: Maven CI for Develop

on:
  push:
    branches:
      - develop

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.set_outputs.outputs.changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install yq (fixed version)
        run: |
          wget https://github.com/mikefarah/yq/releases/download/v4.43.1/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Detect changed metadata.yml files
        id: set_outputs
        run: |
          CHANGED=$(git diff --name-only --diff-filter=AM HEAD^ HEAD | grep 'metadata.yml' | grep -v '^.github/' || true)
          if [ -z "$CHANGED" ]; then
            echo "No relevant YAML changes. Skipping..."
            echo "changed=none" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "$CHANGED" > changed_files.txt
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Upload changed files
        if: steps.set_outputs.outputs.changed != 'none'
        uses: actions/upload-artifact@v4
        with:
          name: changed-files
          path: changed_files.txt

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.changed != 'none'
    strategy:
      matrix:
        execution: [api-first, client]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download changed files
        uses: actions/download-artifact@v4
        with:
          name: changed-files
          path: .

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache OpenAPI Generator
        uses: actions/cache@v3
        with:
          path: ~/.openapi-generator
          key: openapi-${{ hashFiles('**/openapi-rest.yml') }}

      - name: Setup Maven settings
        run: |
          mkdir -p ~/.m2
          echo "<settings>
                  <servers>
                    <server>
                      <id>github</id>
                      <username>${{ github.actor }}</username>
                      <password>${{ secrets.APP_AFESOX }}</password>
                    </server>
                  </servers>
                </settings>" > ~/.m2/settings.xml

      - name: Deploy components from changed metadata
        run: |
          while read FILE; do
            VERSION=$(yq e '.api.version' "$FILE")
            NAME=$(yq e '.api.name' "$FILE")
            EXECUTIONS=$(yq e '.api.executions[].type' "$FILE")

            if [ -z "$VERSION" ] || [ -z "$NAME" ]; then
              echo "Skipping invalid metadata: $FILE"
              continue
            fi

            for EXEC in $EXECUTIONS; do
              ARTIFACT_ID="app-afesox-${NAME}-${EXEC}-stable"
              echo "\n➡️ Deploying $ARTIFACT_ID version $VERSION using profile $EXEC"
          
              mvn clean package -P$EXEC -Dproject.version=$VERSION || exit 1
              mvn deploy -P$EXEC -Dproject.version=$VERSION -Dpackage=$ARTIFACT_ID || {
                echo "Fallback: artifact might exist, skipping deploy"
              }
            done
          done < changed_files.txt