name: Maven CI for Develop

on:
  push:
    branches:
      - develop

jobs:
  detect:
    uses: ./.github/workflows/detect-metadata-changes.yml

  build-and-deploy:
    needs: detect
    if: needs.detect.outputs.changed != 'none'
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    uses: ./.github/workflows/build-and-deploy.yml
    with:
      name: ${{ matrix.name }}
      version: ${{ matrix.version }}
      execution: ${{ matrix.execution }}
      variant: stable
    secrets:
      APP_AFESOX: ${{ secrets.APP_AFESOX }}
