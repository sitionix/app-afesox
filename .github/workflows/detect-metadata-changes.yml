name: Detect Metadata Changes

on:
  workflow_call:
    outputs:
      matrix:
        description: "Matrix of changed modules (strategy.matrix compatible)"
        value: ${{ jobs.detect.outputs.matrix }}
      changed:
        description: "Boolean flag if anything changed"
        value: ${{ jobs.detect.outputs.changed }}
      changed_api:
        description: "Boolean flag if any REST API metadata changed"
        value: ${{ jobs.detect.outputs.changed_api }}
      matrix_api:
        description: "API matrix rows (strategy.matrix compatible)"
        value: ${{ jobs.detect.outputs.matrix_api }}
      matrix_event:
        description: "Event matrix rows (strategy.matrix compatible)"
        value: ${{ jobs.detect.outputs.matrix_event }}
      changed_event:
        description: "Boolean flag if any event metadata changed"
        value: ${{ jobs.detect.outputs.changed_event }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.set_outputs.outputs.changed }}
      matrix: ${{ steps.set_outputs.outputs.matrix }}
      changed_api: ${{ steps.set_outputs.outputs.changed_api }}
      matrix_api: ${{ steps.set_outputs.outputs.matrix_api }}
      matrix_event: ${{ steps.set_outputs.outputs.matrix_event }}
      changed_event: ${{ steps.set_outputs.outputs.changed_event }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq and jq
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y jq
          wget -q https://github.com/mikefarah/yq/releases/download/v4.43.1/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          yq --version
          jq --version

      - name: Detect changed metadata.yml files
        id: set_outputs
        shell: bash
        run: |
          set -euo pipefail

          # ---------- helpers ----------
          emit_empty() {
            echo "changed=none" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo 'changed_api=false' >> "$GITHUB_OUTPUT"
            echo 'matrix_api={"include":[]}' >> "$GITHUB_OUTPUT"
            echo 'matrix_event={"include":[]}' >> "$GITHUB_OUTPUT"
            echo 'changed_event=false' >> "$GITHUB_OUTPUT"
          }

          yq_val() {
            # prints empty on null
            local expr="$1"
            local file="$2"
            local v
            v="$(yq e "$expr" "$file" 2>/dev/null || true)"
            if [[ -z "$v" || "$v" == "null" ]]; then
              echo ""
            else
              echo "$v"
            fi
          }

          # ---------- determine base/head ----------
          # Prefer actual triggering commit range if available, otherwise compare with origin/develop.
          git fetch origin develop --prune

          BASE=""
          HEAD=""

          if [[ -n "${GITHUB_EVENT_PATH:-}" ]] && command -v jq >/dev/null 2>&1; then
            # push event: before/after
            BASE="$(jq -r '.before // empty' "$GITHUB_EVENT_PATH" || true)"
            HEAD="$(jq -r '.after // empty' "$GITHUB_EVENT_PATH" || true)"
          fi

          if [[ -z "$HEAD" ]]; then
            HEAD="$(git rev-parse HEAD)"
          fi

          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            # fallback: previous commit of origin/develop
            BASE="$(git rev-parse origin/develop^)"
          fi

          echo "BASE=$BASE"
          echo "HEAD=$HEAD"

          # ---------- find changed files ----------
          CHANGED_API="$(git diff --name-only --diff-filter=AM "$BASE" "$HEAD" | grep -E '^apis/[^/]+/rest/metadata\.yml$' || true)"
          CHANGED_EVENT="$(git diff --name-only --diff-filter=AM "$BASE" "$HEAD" | grep -E '^apis/[^/]+/event/metadata\.yml$' || true)"

          echo "CHANGED_API=$CHANGED_API"
          echo "CHANGED_EVENT=$CHANGED_EVENT"

          if [[ -z "$CHANGED_API" && -z "$CHANGED_EVENT" ]]; then
            emit_empty
            exit 0
          fi

          API_CHANGED_FLAG=false
          EVENT_CHANGED_FLAG=false
          printf "%s\n%s\n" "$CHANGED_API" "$CHANGED_EVENT" | sed '/^$/d' > changed_files.txt
          echo "changed=true" >> "$GITHUB_OUTPUT"

          MATRIX_ITEMS='[]'

          # ---------- REST API items ----------
          if [[ -n "$CHANGED_API" ]]; then
            API_CHANGED_FLAG=true
            while IFS= read -r FILE; do
              [[ -z "$FILE" ]] && continue
              [[ -f "$FILE" ]] || { echo "::error:: REST API metadata not found: $FILE"; exit 1; }

              VERSION="$(yq_val '.api.version' "$FILE")"
              NAME="$(yq_val '.api.name' "$FILE")"

              # executions as lines; empty means invalid
              EXECUTIONS="$(yq e -r '.api.executions[].type // ""' "$FILE" 2>/dev/null || true)"

              if [[ -z "$VERSION" || -z "$NAME" || -z "$EXECUTIONS" ]]; then
                echo "::error:: Invalid REST API metadata file: $FILE (api.version/api.name/api.executions[].type required)"
                exit 1
              fi

              while IFS= read -r EXEC; do
                [[ -z "$EXEC" ]] && continue
                MATRIX_ITEMS="$(echo "$MATRIX_ITEMS" | jq -c \
                  --arg name "$NAME" \
                  --arg execution "$EXEC" \
                  --arg version "$VERSION" \
                  '. + [{kind:"api", name:$name, execution:$execution, version:$version}]')"
              done <<< "$EXECUTIONS"
            done <<< "$CHANGED_API"
          fi

          # ---------- Event items ----------
          if [[ -n "$CHANGED_EVENT" ]]; then
            EVENT_CHANGED_FLAG=true
            while IFS= read -r FILE; do
              [[ -z "$FILE" ]] && continue
              [[ -f "$FILE" ]] || { echo "::error:: event metadata not found: $FILE"; exit 1; }

              SERVICE="$(echo "$FILE" | awk -F/ '{print $2}')"
              VERSION="$(yq_val '.api.version' "$FILE")"
              DEFINITION="$(yq_val '.api.definition' "$FILE")"
              BASE_WRAPPER_PKG="$(yq_val '.api.wrapperPackage' "$FILE")"

              if [[ -z "$DEFINITION" ]]; then
                DEFINITION="asyncapi.yml"
              fi

              ASYNCAPI_FILE="apis/${SERVICE}/event/${DEFINITION}"
              [[ -f "$ASYNCAPI_FILE" ]] || { echo "::error:: AsyncAPI file not found: $ASYNCAPI_FILE"; exit 1; }

              ASYNCAPI_VERSION="$(yq_val '.info.version' "$ASYNCAPI_FILE")"

              if [[ -z "$VERSION" || -z "$ASYNCAPI_VERSION" ]]; then
                echo "::error:: Invalid event metadata or asyncapi for service ${SERVICE} (api.version and asyncapi.info.version required)"
                exit 1
              fi

              if [[ "$VERSION" != "$ASYNCAPI_VERSION" ]]; then
                echo "::error:: api.version ($VERSION) and asyncapi.info.version ($ASYNCAPI_VERSION) must match for ${SERVICE}"
                exit 1
              fi

              if [[ -z "$BASE_WRAPPER_PKG" ]]; then
                echo "::error:: Missing api.wrapperPackage for ${SERVICE}. Provide a base wrapper package (no event name)."
                exit 1
              fi

              if [[ "$BASE_WRAPPER_PKG" == *".dummy."* ]] || [[ "$BASE_WRAPPER_PKG" == *.dummy ]] || [[ "$BASE_WRAPPER_PKG" == *.dummy.kafka ]]; then
                echo "::error:: Invalid base wrapper package for ${SERVICE}. Remove dummy defaults."
                exit 1
              fi

              if [[ "$BASE_WRAPPER_PKG" == *.kafka ]]; then
                echo "::error:: Base wrapper package for ${SERVICE} must not end with .kafka."
                exit 1
              fi

              EVENT_MATRIX="$(yq -r ".apis[] | select(.definition-path == \"/${SERVICE}/event\") | [.api-spec-type, .event-tag] | @tsv" apis/metadata.yml 2>/dev/null || true)"

              if [[ -z "$EVENT_MATRIX" ]]; then
                echo "::error:: No event entries found in apis/metadata.yml for ${SERVICE} (definition-path=/${SERVICE}/event)"
                exit 1
              fi

              while IFS=$'\t' read -r EXEC EVENT_TAG; do
                [[ -z "$EXEC" || -z "$EVENT_TAG" ]] && { echo "::error:: Invalid event entry in apis/metadata.yml for ${SERVICE}"; exit 1; }

                EVENT_NAME="$(echo "$EVENT_TAG" | tr '[:upper:]' '[:lower:]')"
                NAME="${SERVICE}-event-${EVENT_NAME}"
                EVENT_WRAPPER_PKG="${BASE_WRAPPER_PKG}.${EVENT_NAME}.kafka"
                SHARED_KAFKA_PKG="${BASE_WRAPPER_PKG}.kafka"

                if [[ "$EVENT_WRAPPER_PKG" == *".dummy."* ]] || [[ "$EVENT_WRAPPER_PKG" == *.dummy ]] || [[ "$EVENT_WRAPPER_PKG" == *.dummy.kafka ]]; then
                  echo "::error:: Invalid event wrapper package for ${SERVICE} (${EVENT_WRAPPER_PKG})."
                  exit 1
                fi

                MATRIX_ITEMS="$(echo "$MATRIX_ITEMS" | jq -c \
                  --arg name "$NAME" \
                  --arg execution "$EXEC" \
                  --arg version "$VERSION" \
                  --arg event_service "$SERVICE" \
                  --arg event_name "$EVENT_NAME" \
                  --arg event_tag "$EVENT_TAG" \
                  --arg base_wrapper_package "$BASE_WRAPPER_PKG" \
                  --arg event_wrapper_package "$EVENT_WRAPPER_PKG" \
                  --arg shared_kafka_package "$SHARED_KAFKA_PKG" \
                  '. + [{kind:"event", name:$name, execution:$execution, version:$version, event_service:$event_service, event_name:$event_name, event_tag:$event_tag, base_wrapper_package:$base_wrapper_package, event_wrapper_package:$event_wrapper_package, shared_kafka_package:$shared_kafka_package}]')"
              done <<< "$EVENT_MATRIX"

            done <<< "$CHANGED_EVENT"
          fi

          COUNT="$(echo "$MATRIX_ITEMS" | jq length)"
          echo "MATRIX_ITEMS=$MATRIX_ITEMS"

          if (( COUNT == 0 )); then
            emit_empty
            exit 0
          fi

          if (( COUNT > 250 )); then
            echo "::error:: Too many matrix items ($COUNT > 250)"
            exit 1
          fi

          API_ITEMS="$(echo "$MATRIX_ITEMS" | jq -c '[.[] | select(.kind == "api")]')"
          EVENT_ITEMS="$(echo "$MATRIX_ITEMS" | jq -c '[.[] | select(.kind == "event")]')"

          echo "API_ITEMS=$API_ITEMS"
          echo "EVENT_ITEMS=$EVENT_ITEMS"

          # IMPORTANT: outputs are strategy.matrix compatible objects
          echo "matrix=$(echo "$MATRIX_ITEMS" | jq -c '{include: .}')" >> "$GITHUB_OUTPUT"
          echo "changed_api=$API_CHANGED_FLAG" >> "$GITHUB_OUTPUT"
          echo "matrix_api=$(echo "$API_ITEMS" | jq -c '{include: .}')" >> "$GITHUB_OUTPUT"
          echo "matrix_event=$(echo "$EVENT_ITEMS" | jq -c '{include: .}')" >> "$GITHUB_OUTPUT"
          echo "changed_event=$EVENT_CHANGED_FLAG" >> "$GITHUB_OUTPUT"

      - name: Validate event matrix output
        run: |
          matrix_event_output='${{ steps.set_outputs.outputs.matrix_event }}'
          echo "matrix_event=${matrix_event_output}"
          printf '%s\n' "$matrix_event_output" | jq -e '.' >/dev/null
          if [[ "${{ steps.set_outputs.outputs.changed_event }}" == "true" ]]; then
            count=$(printf '%s\n' "$matrix_event_output" | jq '.include | length')
            if [[ "$count" -eq 0 ]]; then
              echo "::error:: Event metadata changes were detected but matrix_event.include is empty."
              exit 1
            fi
          fi

      - name: Upload changed files
        if: steps.set_outputs.outputs.changed != 'none'
        uses: actions/upload-artifact@v4
        with:
          name: changed-files
          path: changed_files.txt
