name: Delete Unstable Version

description: Delete a GitHub Maven package version if it ends with '-unstable'

inputs:
  name:
    required: true
    description: 'API name'
  execution:
    required: true
    description: 'Execution profile (e.g. server, client)'
  variant:
    required: true
    description: 'Variant string (e.g. sitionix-unstable)'

runs:
  using: 'composite'
  steps:
    - name: Check if variant ends with -unstable
      id: check-variant
      shell: bash
      run: |
        if [[ "${{ inputs.variant }}" == *-unstable ]]; then
          echo "unstable=true" >> $GITHUB_OUTPUT
        else
          echo "unstable=false" >> $GITHUB_OUTPUT

    - name: Delete unstable package version
      if: steps.check-variant.outputs.unstable == 'true'
      shell: bash
      run: |
        ARTIFACT_ID="app-afesox-${{ inputs.name }}-${{ inputs.execution }}-${{ inputs.variant }}"
        echo "Attempting to delete unstable version of artifact: $ARTIFACT_ID"
        curl -X DELETE \
          -H "Authorization: token ${{ secrets.APP_AFESOX }}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/user/packages/maven/com.afesox.$ARTIFACT_ID"
