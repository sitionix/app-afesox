name: Generate Message on Comment

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write

jobs:
  build:
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '/generate') && !contains(github.event.comment.body, 'EVENT ') }}
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.read-definition-metadata.outputs.api_name }}
      execution: ${{ steps.find-api-spec.outputs.api_spec_type }}
      ticket: ${{ steps.extract-ticket-num.outputs.ticket_num }}
      version: ${{ steps.read-definition-metadata.outputs.api_version }}
      ref: ${{ steps.compute-ref.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetch and checkout pull request branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          PR_BRANCH=$(gh pr view $PR_NUMBER --json headRefName -q '.headRefName')
          echo "Pull request branch: $PR_BRANCH"
          git fetch origin $PR_BRANCH
          git checkout $PR_BRANCH

      - name: Log build source (PR)
        run: |
            echo "BUILD_TRIGGER=issue_comment"
            echo "PR_NUMBER=${{ github.event.issue.number }}"
            echo "PR_BRANCH=$(git rev-parse --abbrev-ref HEAD)"
            echo "PR_SHA=$(git rev-parse HEAD)"
      - name: Post initial comment with workflow link
        id: post-initial-comment
        uses: actions/github-script@v6
        with:
          script: |
            const issue_number = context.issue.number;
            const run_id = process.env.GITHUB_RUN_ID;
            const repo = context.repo;
            const workflow_run_url = `https://github.com/${repo.owner}/${repo.repo}/actions/runs/${run_id}`;
            
            const body = [
              '---',
              '### 🚀 Workflow Execution Started',
              '',
              '- **Job Status:** In Progress ✅',
              `- **🔗 [View Workflow Run](${workflow_run_url})**`,
              '---'
            ].join('\n');
            
            await github.rest.issues.createComment({
              ...repo,
              issue_number,
              body
            });


      - name: Verify GitHub Token Access
        run: |
          if [ -z "${{ secrets.APP_AFESOX }}" ]; then
            echo "ERROR: Secret APP_AFESOX is not set or not accessible."
            exit 1
          fi

      - name: Parse command and extract name
        id: parse-command
        run: |
          api_name=$(echo '${{ github.event.comment.body }}' | grep -oP '(?<=--name \")[^\"]*')
          echo "api_name=$api_name" >> $GITHUB_OUTPUT

      - name: Extract ticket number from PR title
        id: extract-ticket-num
        run: |
          pr_title="${{ github.event.issue.title }}"
          if [[ ! "$pr_title" =~ \[.*\] ]]; then
            echo "ERROR: Pull Request title must have the correct format [SITIONIX-*] description."
            exit 1
          fi
          ticket_num=$(echo "$pr_title" | grep -oP '(?<=\[)[^]]*(?=\])' | tr '[:upper:]' '[:lower:]' | tr '/' '-')
          echo "ticket_num=$ticket_num" >> $GITHUB_OUTPUT

      - name: Read metadata and find api-spec-type and definition-path
        id: find-api-spec
        run: |
          api_name="${{ steps.parse-command.outputs.api_name }}"
          echo "Looking for API name: $api_name"
          api_spec_type=$(yq eval ".apis[] | select(.name == \"$api_name\") | .api-spec-type" ./apis/metadata.yml)
          definition_path=$(yq eval ".apis[] | select(.name == \"$api_name\") | .definition-path" ./apis/metadata.yml)
          api_spec_type=$(echo "$api_spec_type" | tr -d '\r' | xargs)
          definition_path=$(echo "$definition_path" | tr -d '\r' | xargs)
          if [ -z "$api_spec_type" ] || [ "$api_spec_type" = "null" ]; then
            echo "ERROR: name not found in apis/metadata.yml"
            exit 1
          fi
          if echo "$api_spec_type" | grep -q "^event-"; then
            echo "ERROR: event generation uses trigger-message-event.yml"
            exit 1
          fi
          echo "api_spec_type=$api_spec_type" >> $GITHUB_OUTPUT
          echo "definition_path=$definition_path" >> $GITHUB_OUTPUT

      - name: Ensure PR contains metadata change for selected API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PR_NUMBER=${{ github.event.issue.number }}
          BASE_REF=$(gh pr view "$PR_NUMBER" --json baseRefName -q '.baseRefName')
          definition_path="${{ steps.find-api-spec.outputs.definition_path }}"
          definition_path="${definition_path#/}"
          target_metadata_file="apis/${definition_path}/metadata.yml"

          git fetch origin "$BASE_REF" --prune
          merge_base="$(git merge-base "origin/$BASE_REF" HEAD)"
          changed_files="$(git diff --name-only "$merge_base" HEAD)"

          if ! printf '%s\n' "$changed_files" | grep -Fxq "$target_metadata_file"; then
            echo "ERROR: /generate is allowed only when PR changes ${target_metadata_file}."
            echo "Add a metadata version update for the selected API and retry /generate."
            exit 1
          fi

      - name: Ensure selected API version is bumped and synced with OpenAPI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PR_NUMBER=${{ github.event.issue.number }}
          BASE_REF=$(gh pr view "$PR_NUMBER" --json baseRefName -q '.baseRefName')
          definition_path="${{ steps.find-api-spec.outputs.definition_path }}"
          definition_path="${definition_path#/}"
          target_metadata_file="apis/${definition_path}/metadata.yml"

          git fetch origin "$BASE_REF" --prune

          current_api_version="$(yq e '.api.version' "$target_metadata_file")"
          if [[ -z "$current_api_version" || "$current_api_version" == "null" ]]; then
            echo "ERROR: api.version is missing in ${target_metadata_file}"
            exit 1
          fi

          base_api_version="$(
            git show "origin/$BASE_REF:$target_metadata_file" 2>/dev/null | yq e '.api.version' - 2>/dev/null || true
          )"
          base_api_version="$(echo "$base_api_version" | tr -d '\r' | xargs)"
          if [[ -z "$base_api_version" || "$base_api_version" == "null" ]]; then
            echo "ERROR: base api.version not found for ${target_metadata_file} on ${BASE_REF}."
            echo "Generation requires explicit version bump against base branch."
            exit 1
          fi

          if [[ "$current_api_version" == "$base_api_version" ]]; then
            echo "ERROR: api.version for ${target_metadata_file} was not bumped."
            echo "Base: ${base_api_version}, PR: ${current_api_version}."
            echo "Bump api.version before running /generate."
            exit 1
          fi

          definition_file="$(yq e '.api.definition' "$target_metadata_file")"
          if [[ -z "$definition_file" || "$definition_file" == "null" ]]; then
            definition_file="openapi.yml"
          fi
          openapi_file="apis/${definition_path}/${definition_file}"

          if [[ ! -f "$openapi_file" ]]; then
            echo "ERROR: OpenAPI definition file not found at ${openapi_file}."
            exit 1
          fi

          openapi_version="$(yq e '.info.version' "$openapi_file")"
          if [[ -z "$openapi_version" || "$openapi_version" == "null" ]]; then
            echo "ERROR: info.version is missing in ${openapi_file}."
            exit 1
          fi

          if [[ "$openapi_version" != "$current_api_version" ]]; then
            echo "ERROR: version mismatch between ${target_metadata_file} and ${openapi_file}."
            echo "metadata api.version=${current_api_version}, openapi info.version=${openapi_version}."
            exit 1
          fi

      - name: Read additional metadata from definition-path
        id: read-definition-metadata
        run: |
          definition_path="${{ steps.find-api-spec.outputs.definition_path }}"
          definition_path="${definition_path#/}"
          metadata_file="./apis/${definition_path}/metadata.yml"
          if [ ! -f "$metadata_file" ]; then
            echo "ERROR: metadata.yml not found at $metadata_file"
            exit 1
          fi
          version=$(yq eval '.api.version' $metadata_file)
          name=$(yq eval '.api.name' $metadata_file)
          if [ -z "$version" ] || [ "$version" = "null" ] || \
             [ -z "$name" ] || [ "$name" = "null" ]; then
            echo "ERROR: api metadata is incomplete in $metadata_file"
            exit 1
          fi
          echo "api_version=$version" >> $GITHUB_OUTPUT
          echo "api_name=$name" >> $GITHUB_OUTPUT

      - name: Compute current ref
        id: compute-ref
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  delete-unused-version:
    needs: build
    uses: ./.github/workflows/delete-unstable-workflow.yml
    with:
      name: ${{ needs.build.outputs.name }}
      execution: ${{ needs.build.outputs.execution }}
      ticket: ${{ needs.build.outputs.ticket }}-unstable
      issue_number: ${{ github.event.issue.number }}
    secrets:
      APP_AFESOX: ${{ secrets.APP_AFESOX }}

  deploy:
    needs: [build, delete-unused-version]
    if: ${{ needs.build.outputs.execution != 'frontend' }}
    uses: ./.github/workflows/build-and-deploy.yml
    with:
      name: ${{ needs.build.outputs.name }}
      version: ${{ needs.build.outputs.version }}
      execution: ${{ needs.build.outputs.execution }}
      variant: ${{ needs.build.outputs.ticket }}-unstable
      issue_number: ${{ github.event.issue.number }}
      ref: ${{ needs.build.outputs.ref }}
    secrets:
      APP_AFESOX: ${{ secrets.APP_AFESOX }}

  deploy-frontend-contract:
    needs: [build, delete-unused-version]
    if: ${{ needs.build.outputs.execution == 'frontend' }}
    uses: ./.github/workflows/build-and-deploy-frontend-contract.yml
    with:
      name: ${{ needs.build.outputs.name }}
      version: ${{ needs.build.outputs.version }}
      execution: ${{ needs.build.outputs.execution }}
      variant: ${{ needs.build.outputs.ticket }}-unstable
      issue_number: ${{ github.event.issue.number }}
      ref: ${{ needs.build.outputs.ref }}
    secrets:
      APP_AFESOX: ${{ secrets.APP_AFESOX }}

  notify-failure:
    name: Build failure comment
    if: failure()
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Post comment to PR
        uses: actions/github-script@v6
        with:
          script: |
            const issue_number = context.issue.number;
            const run_id = process.env.GITHUB_RUN_ID;
            const repo = context.repo;
            const workflow_run_url = `https://github.com/${repo.owner}/${repo.repo}/actions/runs/${run_id}`;

            const body = [
              '---',
              '### ❌ Build Job Failed',
              '',
              '> ⚠️ **The build job could not be completed.**',
              '',
              `🔍 [View Workflow Run Logs](${workflow_run_url})`,
              '---'
            ].join('\n');

            await github.rest.issues.createComment({
              ...repo,
              issue_number,
              body
            });
