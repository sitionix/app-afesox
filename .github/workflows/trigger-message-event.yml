name: Generate Event Message on Comment

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write

jobs:
  build:
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '/generate') && contains(github.event.comment.body, 'EVENT ') }}
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.read-definition-metadata.outputs.api_name }}
      execution: ${{ steps.find-api-spec.outputs.api_spec_type }}
      ticket: ${{ steps.extract-ticket-num.outputs.ticket_num }}
      version: ${{ steps.read-definition-metadata.outputs.api_version }}
      event_service: ${{ steps.read-definition-metadata.outputs.event_service }}
      event_tag: ${{ steps.read-definition-metadata.outputs.event_tag }}
      event_name: ${{ steps.read-definition-metadata.outputs.event_name }}
      event_wrapper_package: ${{ steps.read-definition-metadata.outputs.event_wrapper_package }}
      base_wrapper_package: ${{ steps.read-definition-metadata.outputs.base_wrapper_package }}
      shared_kafka_package: ${{ steps.read-definition-metadata.outputs.shared_kafka_package }}
      ref: ${{ steps.compute-ref.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetch and checkout pull request branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          PR_BRANCH=$(gh pr view $PR_NUMBER --json headRefName -q '.headRefName')
          echo "Pull request branch: $PR_BRANCH"
          git fetch origin $PR_BRANCH
          git checkout $PR_BRANCH

      - name: Log build source (PR)
        run: |
            echo "BUILD_TRIGGER=issue_comment"
            echo "PR_NUMBER=${{ github.event.issue.number }}"
            echo "PR_BRANCH=$(git rev-parse --abbrev-ref HEAD)"
            echo "PR_SHA=$(git rev-parse HEAD)"
      - name: Post initial comment with workflow link
        id: post-initial-comment
        uses: actions/github-script@v6
        with:
          script: |
            const issue_number = context.issue.number;
            const run_id = process.env.GITHUB_RUN_ID;
            const repo = context.repo;
            const workflow_run_url = `https://github.com/${repo.owner}/${repo.repo}/actions/runs/${run_id}`;
            
            const body = [
              '---',
              '### 🚀 Event Workflow Execution Started',
              '',
              '- **Job Status:** In Progress ✅',
              `- **🔗 [View Workflow Run](${workflow_run_url})**`,
              '---'
            ].join('\n');
            
            await github.rest.issues.createComment({
              ...repo,
              issue_number,
              body
            });

      - name: Verify GitHub Token Access
        run: |
          if [ -z "${{ secrets.APP_AFESOX }}" ]; then
            echo "ERROR: Secret APP_AFESOX is not set or not accessible."
            exit 1
          fi

      - name: Parse command and extract name
        id: parse-command
        run: |
          api_name=$(echo '${{ github.event.comment.body }}' | grep -oP '(?<=--name \")[^\"]*')
          echo "api_name=$api_name" >> $GITHUB_OUTPUT

      - name: Extract ticket number from PR title
        id: extract-ticket-num
        run: |
          pr_title="${{ github.event.issue.title }}"
          if [[ ! "$pr_title" =~ \[.*\] ]]; then
            echo "ERROR: Pull Request title must have the correct format [SITIONIX-*] description."
            exit 1
          fi
          ticket_num=$(echo "$pr_title" | grep -oP '(?<=\[)[^]]*(?=\])' | tr '[:upper:]' '[:lower:]' | tr '/' '-')
          echo "ticket_num=$ticket_num" >> $GITHUB_OUTPUT

      - name: Read metadata and find api-spec-type and definition-path
        id: find-api-spec
        run: |
          api_name="${{ steps.parse-command.outputs.api_name }}"
          echo "Looking for EVENT name: $api_name"
          api_spec_type=$(yq eval ".apis[] | select(.name == \"$api_name\") | .api-spec-type" ./apis/metadata.yml)
          definition_path=$(yq eval ".apis[] | select(.name == \"$api_name\") | .definition-path" ./apis/metadata.yml)
          event_tag=$(yq eval ".apis[] | select(.name == \"$api_name\") | .event-tag" ./apis/metadata.yml)
          api_spec_type=$(echo "$api_spec_type" | tr -d '\r' | xargs)
          definition_path=$(echo "$definition_path" | tr -d '\r' | xargs)
          if [ -z "$api_spec_type" ] || [ "$api_spec_type" = "null" ]; then
            echo "ERROR: name not found in apis/metadata.yml"
            exit 1
          fi
          if ! echo "$api_spec_type" | grep -q "^event-"; then
            echo "ERROR: event workflow only supports event-* entries."
            exit 1
          fi
          if [ -z "$event_tag" ] || [ "$event_tag" = "null" ]; then
            echo "ERROR: event-tag is required for event entries in apis/metadata.yml"
            exit 1
          fi
          echo "api_spec_type=$api_spec_type" >> $GITHUB_OUTPUT
          echo "definition_path=$definition_path" >> $GITHUB_OUTPUT
          echo "event_tag=$event_tag" >> $GITHUB_OUTPUT

      - name: Ensure PR contains metadata change for selected event API
        run: |
          set -euo pipefail
          PR_NUMBER=${{ github.event.issue.number }}
          BASE_REF=$(gh pr view "$PR_NUMBER" --json baseRefName -q '.baseRefName')
          definition_path="${{ steps.find-api-spec.outputs.definition_path }}"
          definition_path="${definition_path#/}"
          target_metadata_file="apis/${definition_path}/metadata.yml"

          git fetch origin "$BASE_REF" --prune
          merge_base="$(git merge-base "origin/$BASE_REF" HEAD)"
          changed_files="$(git diff --name-only "$merge_base" HEAD)"

          if ! printf '%s\n' "$changed_files" | grep -Fxq "$target_metadata_file"; then
            echo "ERROR: /generate is allowed only when PR changes ${target_metadata_file}."
            echo "Add a metadata version update for the selected event API and retry /generate."
            exit 1
          fi

      - name: Read additional metadata from definition-path
        id: read-definition-metadata
        run: |
          definition_path="${{ steps.find-api-spec.outputs.definition_path }}"
          definition_path="${definition_path#/}"
          event_service=$(echo "$definition_path" | cut -d'/' -f1)
          event_tag="${{ steps.find-api-spec.outputs.event_tag }}"
          event_name=$(echo "$event_tag" | tr '[:upper:]' '[:lower:]')
          metadata_file="./apis/${event_service}/event/metadata.yml"
          if [ ! -f "$metadata_file" ]; then
            echo "ERROR: event metadata.yml not found at $metadata_file"
            exit 1
          fi
          version=$(yq eval '.api.version' $metadata_file)
          definition=$(yq eval '.api.definition' $metadata_file)
          base_wrapper_package=$(yq eval '.api.wrapperPackage' $metadata_file)
          if [ -z "$definition" ] || [ "$definition" = "null" ]; then
            definition="asyncapi.yml"
          fi
          asyncapi_file="./apis/${event_service}/event/${definition}"
          if [ ! -f "$asyncapi_file" ]; then
            echo "ERROR: asyncapi file not found at $asyncapi_file"
            exit 1
          fi
          asyncapi_version=$(yq eval '.info.version' "$asyncapi_file")
          if [ -z "$version" ] || [ "$version" = "null" ] || \
             [ -z "$asyncapi_version" ] || [ "$asyncapi_version" = "null" ]; then
            echo "ERROR: api.version or asyncapi.info.version missing"
            exit 1
          fi
          if [ "$version" != "$asyncapi_version" ]; then
            echo "ERROR: api.version ($version) and asyncapi.info.version ($asyncapi_version) must match"
            exit 1
          fi
          if [ -z "$base_wrapper_package" ] || [ "$base_wrapper_package" = "null" ]; then
            echo "ERROR: api.wrapperPackage is required in $metadata_file"
            exit 1
          fi
          if [[ "$base_wrapper_package" == *.kafka ]]; then
            echo "ERROR: api.wrapperPackage must not end with .kafka"
            exit 1
          fi
          if [[ "$base_wrapper_package" == *".dummy."* ]] || [[ "$base_wrapper_package" == *.dummy ]] || [[ "$base_wrapper_package" == *.dummy.kafka ]]; then
            echo "ERROR: api.wrapperPackage must not contain dummy"
            exit 1
          fi
          wrapper_package="${base_wrapper_package}.${event_name}.kafka"
          shared_kafka_package="${base_wrapper_package}.kafka"
          echo "Resolved event metadata: service=$event_service tag=$event_tag version=$version"
          echo "api_version=$version" >> $GITHUB_OUTPUT
          echo "api_name=${event_service}-event-${event_name}" >> $GITHUB_OUTPUT
          echo "event_service=$event_service" >> $GITHUB_OUTPUT
          echo "event_tag=$event_tag" >> $GITHUB_OUTPUT
          echo "event_name=$event_name" >> $GITHUB_OUTPUT
          echo "event_wrapper_package=$wrapper_package" >> $GITHUB_OUTPUT
          echo "base_wrapper_package=$base_wrapper_package" >> $GITHUB_OUTPUT
          echo "shared_kafka_package=$shared_kafka_package" >> $GITHUB_OUTPUT

      - name: Compute current ref
        id: compute-ref
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  delete-unused-version:
    needs: build
    uses: ./.github/workflows/delete-unstable-event-workflow.yml
    with:
      event_service: ${{ needs.build.outputs.event_service }}
      event_name: ${{ needs.build.outputs.event_name }}
      execution: ${{ needs.build.outputs.execution }}
      ticket: ${{ needs.build.outputs.ticket }}-unstable
      issue_number: ${{ github.event.issue.number }}
    secrets:
      APP_AFESOX: ${{ secrets.APP_AFESOX }}

  deploy:
    needs: [build, delete-unused-version]
    uses: ./.github/workflows/build-and-deploy-event.yml
    with:
      name: ${{ needs.build.outputs.name }}
      version: ${{ needs.build.outputs.version }}
      execution: ${{ needs.build.outputs.execution }}
      event_service: ${{ needs.build.outputs.event_service }}
      event_tag: ${{ needs.build.outputs.event_tag }}
      event_name: ${{ needs.build.outputs.event_name }}
      event_wrapper_package: ${{ needs.build.outputs.event_wrapper_package }}
      base_wrapper_package: ${{ needs.build.outputs.base_wrapper_package }}
      shared_kafka_package: ${{ needs.build.outputs.shared_kafka_package }}
      variant: ${{ needs.build.outputs.ticket }}-unstable
      issue_number: ${{ github.event.issue.number }}
      ref: ${{ needs.build.outputs.ref }}
    secrets:
      APP_AFESOX: ${{ secrets.APP_AFESOX }}

  notify-failure:
    name: Build failure comment
    if: failure()
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Post comment to PR
        uses: actions/github-script@v6
        with:
          script: |
            const issue_number = context.issue.number;
            const run_id = process.env.GITHUB_RUN_ID;
            const repo = context.repo;
            const workflow_run_url = `https://github.com/${repo.owner}/${repo.repo}/actions/runs/${run_id}`;

            const body = [
              '---',
              '### ❌ Build Job Failed',
              '',
              '> ⚠️ **The build job could not be completed.**',
              '',
              `🔍 [View Workflow Run Logs](${workflow_run_url})`,
              '---'
            ].join('\n');

            await github.rest.issues.createComment({
              ...repo,
              issue_number,
              body
            });
