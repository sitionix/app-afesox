components:
  schemas:
    ErrorDTO:
      type: object
      required:
        - code
        - title
        - details
      properties:
        code:
          type: integer
          example: 401
        title:
          type: string
          example: Unauthorized
        details:
          type: string
          example: Invalid email or password
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDTO'
          examples:
            default:
              summary: Bad Request
              value:
                code: 400
                title: Bad Request
                details: Request validation failed
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDTO'
          examples:
            default:
              summary: Not Found
              value:
                code: 404
                title: Not Found
                details: Resource not found
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDTO'
          examples:
            default:
              summary: Conflict
              value:
                code: 409
                title: Conflict
                details: Resource is in a conflicting state
    Gone:
      description: Gone
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDTO'
          examples:
            default:
              summary: Gone
              value:
                code: 410
                title: Gone
                details: Resource is no longer available
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDTO'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDTO'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDTO'
    TooManyRequests:
      description: Too Many Requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDTO'
          examples:
            default:
              summary: Too Many Requests
              value:
                code: 429
                title: Too Many Requests
                details: Please wait before requesting another verification email.
