components:
  schemas:
    ErrorDTO:
      type: object
      required:
        - code
        - title
        - details
      properties:
        code:
          type: integer
          example: 401
        title:
          type: string
          example: Unauthorized
        details:
          type: string
          example: Invalid email or password
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDTO'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDTO'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDTO'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDTO'
