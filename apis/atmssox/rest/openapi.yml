openapi: "3.0.0"
info:
  title: API Automation Service Sitionix
  description: API specification for automation service
  version: 0.0.30
  contact:
    name: APP Sitionix
servers:
  - description: Localhost (dev only)
    url: 'http://localhost:9083/atmssox'
tags:
  - name: Agent
  - name: AgentProject
  - name: AgentConversation
  - name: AgentRule
  - name: AgentChat
paths:
  /api/v1/agents:
    $ref: './paths/v1/agents.yml'
  /api/v1/agent-projects:
    $ref: './paths/v1/agent-projects.yml'
  /api/v1/agent-projects/{projectId}:
    $ref: './paths/v1/agent-projects-by-id.yml'
  /api/v1/agent-projects/{projectId}/flow:
    $ref: './paths/v1/agent-projects-flow.yml'
  /api/v1/agent-projects/{projectId}/flow/palette:
    $ref: './paths/v1/agent-projects-flow-palette.yml'
  /api/v1/agent-projects/{projectId}/agents:
    $ref: './paths/v1/agent-projects-agents.yml'
  /api/v1/agent-projects/{projectId}/agents/{agentId}:
    $ref: './paths/v1/agent-projects-agents-by-id.yml'
  /api/v1/agent-projects/{projectId}/conversations:
    $ref: './paths/v1/agent-projects-conversations.yml'
  /api/v1/agent-projects/{projectId}/conversations/{conversationId}:
    $ref: './paths/v1/agent-projects-conversations-by-id.yml'
  /api/v1/agents/{agentId}:
    $ref: './paths/v1/agents-by-id.yml'
  /api/v1/agents/{agentId}/activate:
    $ref: './paths/v1/agents-activate.yml'
  /api/v1/agents/{agentId}/archive:
    $ref: './paths/v1/agents-archive.yml'
  /api/v1/agents/{agentId}/restore:
    $ref: './paths/v1/agents-restore.yml'
  /api/v1/agents/{agentId}/chat:
    $ref: './paths/v1/agents-chat.yml'
  /api/v1/agents/{agentId}/chat/executions:
    $ref: './paths/v1/agents-chat-executions.yml'
  /api/v1/agents/{agentId}/chat/executions/{executionId}:
    $ref: './paths/v1/agents-chat-executions-by-id.yml'
  /api/v1/agents/{agentId}/rules:
    $ref: './paths/v1/agents-rules.yml'
  /api/v1/agents/{agentId}/rules/{ruleId}:
    $ref: './paths/v1/agents-rules-by-id.yml'
  /api/v1/agents/{agentId}/rules/{ruleId}/accept:
    $ref: './paths/v1/agents-rules-accept.yml'
  /api/v1/agents/{agentId}/rules/{ruleId}/reject:
    $ref: './paths/v1/agents-rules-reject.yml'
  /api/v1/agents/{agentId}/conversations:
    $ref: './paths/v1/agents-conversations.yml'
  /api/v1/conversations/{conversationId}:
    $ref: './paths/v1/agents-conversations-by-id.yml'
  /api/v1/conversations/{conversationId}/executions:
    $ref: './paths/v1/conversations-executions.yml'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Service-to-service access token (Bearer).
  schemas:
    CreateAgentRequestDTO:
      $ref: './schemas/v1/agent/create-agent-request-dto.yml#/CreateAgentRequestDTO'
    CreateAgentProjectRequestDTO:
      $ref: './schemas/v1/agent/create-agent-project-request-dto.yml#/CreateAgentProjectRequestDTO'
    PatchAgentRequestDTO:
      $ref: './schemas/v1/agent/patch-agent-request-dto.yml#/PatchAgentRequestDTO'
    PatchAgentProjectRequestDTO:
      $ref: './schemas/v1/agent/patch-agent-project-request-dto.yml#/PatchAgentProjectRequestDTO'
    AddAgentToProjectRequestDTO:
