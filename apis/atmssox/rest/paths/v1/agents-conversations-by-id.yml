get:
  tags:
    - Agent
  operationId: getAgentConversation
  summary: Get agent conversation details
  description: >
    Returns one active direct conversation with full ordered message history
    for current user scoped to one agent.
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: agentId
      required: true
      schema:
        type: string
        format: uuid
    - in: path
      name: conversationId
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Agent conversation details
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/AgentConversationDetailsDTO'
    '401':
      $ref: '../../openapi.yml#/components/responses/Unauthorized'
    '403':
      $ref: '../../openapi.yml#/components/responses/Forbidden'
    '404':
      $ref: '../../openapi.yml#/components/responses/NotFound'
    '500':
      $ref: '../../openapi.yml#/components/responses/InternalServerError'
