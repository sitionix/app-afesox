post:
  tags:
    - AgentChat
  operationId: submitAgentChatExecution
  summary: Submit async agent chat execution
  description: >
    Accepts user message for asynchronous execution and returns lifecycle envelope.
    Creates conversation when conversationId is absent.
    Duplicate in-flight submit for the same clientRequestId returns the same executionId.
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: agentId
      required: true
      schema:
        type: string
        format: uuid
    - in: header
      name: Idempotency-Key
      required: false
      schema:
        type: string
      description: Optional key for safe deduplication of submit retries.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../openapi.yml#/components/schemas/ChatAgentRequestDTO'
  responses:
    '202':
      description: Chat execution accepted
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/SubmitChatExecutionResponseDTO'
    '400':
      $ref: '../../openapi.yml#/components/responses/BadRequest'
    '401':
      $ref: '../../openapi.yml#/components/responses/Unauthorized'
    '403':
      $ref: '../../openapi.yml#/components/responses/Forbidden'
    '404':
      $ref: '../../openapi.yml#/components/responses/NotFound'
    '409':
      $ref: '../../openapi.yml#/components/responses/Conflict'
    '500':
      $ref: '../../openapi.yml#/components/responses/InternalServerError'
