post:
  tags:
    - Agent
  operationId: submitAgentChatExecution
  summary: Submit async agent chat execution
  description: >
    Accepts user message for asynchronous execution and returns lifecycle envelope.
    Creates conversation when conversationId is absent.
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: agentId
      required: true
      schema:
        type: string
        format: uuid
    - in: header
      name: Idempotency-Key
      required: false
      schema:
        type: string
      description: Optional key for safe deduplication of submit retries.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../openapi.yml#/components/schemas/ChatAgentRequestDTO'
  responses:
    '202':
      description: Chat execution accepted
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/SubmitChatExecutionResponseDTO'
    '400':
      description: Invalid request payload or idempotency conflict.
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/ErrorDTO'
    '401':
      $ref: '../../openapi.yml#/components/responses/Unauthorized'
    '403':
      description: Ownership or visibility violation for agent or conversation.
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/ErrorDTO'
    '404':
      description: Conversation not found for provided context.
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/ErrorDTO'
    '409':
      description: Invalid lifecycle transition or state conflict.
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/ErrorDTO'
    '500':
      $ref: '../../openapi.yml#/components/responses/InternalServerError'
