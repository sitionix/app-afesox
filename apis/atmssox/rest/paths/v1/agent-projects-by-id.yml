get:
  tags:
    - Agent
  operationId: getAgentProject
  summary: Get agent project by id
  description: >
    Returns agent project details for the authenticated user.
    Returns 404 when project is missing, deleted, or not owned by the current user.
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: projectId
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Agent project details
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/AgentProjectDTO'
    '400':
      $ref: '../../openapi.yml#/components/responses/BadRequest'
    '401':
      $ref: '../../openapi.yml#/components/responses/Unauthorized'
    '404':
      $ref: '../../openapi.yml#/components/responses/NotFound'
    '500':
      $ref: '../../openapi.yml#/components/responses/InternalServerError'
