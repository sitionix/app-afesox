get:
  tags:
    - Agent
  operationId: getAgentRules
  summary: Get automation rules
  description: >
    Returns rules for one automation agent owned by the authenticated user.
    Rules are sorted by createdAt ascending.
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: agentId
      required: true
      schema:
        type: string
        format: uuid
    - in: query
      name: status
      required: false
      schema:
        $ref: '../../openapi.yml#/components/schemas/AgentRuleStatusDTO'
      description: Rule status filter. If omitted, service returns ACTIVE rules by default.
    - in: query
      name: authorType
      required: false
      schema:
        $ref: '../../openapi.yml#/components/schemas/AgentRuleAuthorTypeDTO'
      description: Optional author source filter.
  responses:
    '200':
      description: Active rules collection
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/AgentRulesResponseDTO'
    '400':
      $ref: '../../openapi.yml#/components/responses/BadRequest'
    '401':
      $ref: '../../openapi.yml#/components/responses/Unauthorized'
    '403':
      $ref: '../../openapi.yml#/components/responses/Forbidden'
    '404':
      $ref: '../../openapi.yml#/components/responses/NotFound'
    '500':
      $ref: '../../openapi.yml#/components/responses/InternalServerError'
post:
  tags:
    - Agent
  operationId: createAgentRule
  summary: Create automation rule
  description: >
    Creates one active user-authored rule for one automation agent owned by the authenticated user.
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: agentId
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../openapi.yml#/components/schemas/CreateAgentRuleRequestDTO'
  responses:
    '201':
      description: Created rule
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/AgentRuleDTO'
    '400':
      $ref: '../../openapi.yml#/components/responses/BadRequest'
    '401':
      $ref: '../../openapi.yml#/components/responses/Unauthorized'
    '403':
      $ref: '../../openapi.yml#/components/responses/Forbidden'
    '404':
      $ref: '../../openapi.yml#/components/responses/NotFound'
    '500':
      $ref: '../../openapi.yml#/components/responses/InternalServerError'
