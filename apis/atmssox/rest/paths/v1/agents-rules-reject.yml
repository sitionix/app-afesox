post:
  tags:
    - AgentRule
  operationId: rejectAgentRule
  summary: Reject automation rule
  description: >
    Rejects one suggested AI automation rule owned by the authenticated user.
    Allowed transition: PENDING with AI author type to REJECTED.
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: agentId
      required: true
      schema:
        type: string
        format: uuid
    - in: path
      name: ruleId
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Rejected rule
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/AgentRuleDTO'
    '400':
      $ref: '../../openapi.yml#/components/responses/BadRequest'
    '401':
      $ref: '../../openapi.yml#/components/responses/Unauthorized'
    '403':
      $ref: '../../openapi.yml#/components/responses/Forbidden'
    '404':
      $ref: '../../openapi.yml#/components/responses/NotFound'
    '409':
      $ref: '../../openapi.yml#/components/responses/Conflict'
    '500':
      $ref: '../../openapi.yml#/components/responses/InternalServerError'
