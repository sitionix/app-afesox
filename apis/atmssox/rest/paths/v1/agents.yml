get:
  tags:
    - Agent
  operationId: getAgents
  summary: Get agents
  description: >
    Returns the currently persisted automation agents.
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Agents collection
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/AgentsResponseDTO'
    '401':
      $ref: '../../openapi.yml#/components/responses/Unauthorized'
    '403':
      $ref: '../../openapi.yml#/components/responses/Forbidden'
    '500':
      $ref: '../../openapi.yml#/components/responses/InternalServerError'
post:
  tags:
    - Agent
  operationId: createAgent
  summary: Create agent
  description: >
    Creates a new automation agent with initial `DRAFT` status.
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../openapi.yml#/components/schemas/CreateAgentRequestDTO'
  responses:
    '201':
      description: Agent created
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/AgentDTO'
    '400':
      $ref: '../../openapi.yml#/components/responses/BadRequest'
    '401':
      $ref: '../../openapi.yml#/components/responses/Unauthorized'
    '403':
      $ref: '../../openapi.yml#/components/responses/Forbidden'
    '500':
      $ref: '../../openapi.yml#/components/responses/InternalServerError'
