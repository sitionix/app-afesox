post:
  tags:
    - Agent
  operationId: restoreAgent
  summary: Restore agent
  description: >
    Restores one archived automation agent by identifier.
    Allowed transition for this version: `ARCHIVED -> DRAFT`.
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: agentId
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Updated agent
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/AgentDTO'
    '400':
      $ref: '../../openapi.yml#/components/responses/BadRequest'
    '401':
      $ref: '../../openapi.yml#/components/responses/Unauthorized'
    '403':
      $ref: '../../openapi.yml#/components/responses/Forbidden'
    '404':
      $ref: '../../openapi.yml#/components/responses/NotFound'
    '409':
      $ref: '../../openapi.yml#/components/responses/Conflict'
    '500':
      $ref: '../../openapi.yml#/components/responses/InternalServerError'
