AgentProjectFlowResponseDTO:
  title: AgentProjectFlowResponseDTO
  type: object
  additionalProperties: false
  required:
    - nodes
    - edges
  properties:
    flowId:
      type: string
      format: uuid
      nullable: true
      description: Saved flow identifier, null when no flow has been saved.
    nodes:
      type: array
      description: Persisted flow design nodes.
      items:
        $ref: '../../../openapi.yml#/components/schemas/AgentProjectFlowNodeDTO'
    edges:
      type: array
      description: Persisted flow design edges.
      items:
        $ref: '../../../openapi.yml#/components/schemas/AgentProjectFlowEdgeDTO'
