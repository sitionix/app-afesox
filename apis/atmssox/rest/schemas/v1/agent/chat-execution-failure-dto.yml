ChatExecutionFailureDTO:
  title: ChatExecutionFailureDTO
  type: object
  additionalProperties: false
  required:
    - failureClass
    - reason
    - retryable
  properties:
    failureClass:
      type: string
      description: Stable failure taxonomy for async execution.
      enum:
        - OWNERSHIP_VIOLATION
        - CONVERSATION_NOT_FOUND
        - INVALID_LIFECYCLE_STATE
        - IDEMPOTENCY_CONFLICT
        - EXECUTION_ERROR
    reason:
      type: string
      description: Human-readable failure summary safe for client consumption.
      example: Execution failed due to an upstream model timeout.
    retryable:
      type: boolean
      description: Indicates whether client can safely retry submit request.
