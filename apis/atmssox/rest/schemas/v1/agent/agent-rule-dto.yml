AgentRuleDTO:
  title: AgentRuleDTO
  type: object
  additionalProperties: false
  required:
    - id
    - agentId
    - title
    - content
    - status
    - authorType
    - createdAt
    - updatedAt
  properties:
    id:
      type: string
      format: uuid
      description: Globally unique rule identifier.
    agentId:
      type: string
      format: uuid
      description: Globally unique agent identifier.
    title:
      type: string
      description: Rule title used in UI and matching.
    content:
      type: string
      description: Rule content used in execution context.
    status:
      $ref: './agent-rule-status-dto.yml#/AgentRuleStatusDTO'
    authorType:
      $ref: './agent-rule-author-type-dto.yml#/AgentRuleAuthorTypeDTO'
    createdAt:
      type: string
      format: date-time
      description: Rule creation timestamp (UTC).
    updatedAt:
      type: string
      format: date-time
      description: Last rule update timestamp (UTC).
