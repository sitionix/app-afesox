PatchAgentRuleRequestDTO:
  title: PatchAgentRuleRequestDTO
  type: object
  additionalProperties: false
  anyOf:
    - required:
        - title
    - required:
        - content
  properties:
    title:
      type: string
      minLength: 1
      pattern: ".*\\S.*"
      description: Updated rule title. Value is trimmed before validation.
      example: Language preference
    content:
      type: string
      minLength: 1
      pattern: ".*\\S.*"
      description: Updated rule content. Value is trimmed before validation.
      example: Always answer in Ukrainian unless user explicitly asks otherwise.
