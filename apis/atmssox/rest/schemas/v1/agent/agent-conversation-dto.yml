AgentConversationDTO:
  title: AgentConversationDTO
  type: object
  additionalProperties: false
  required:
    - id
    - title
    - type
    - createdAt
    - updatedAt
    - lastMessageAt
  properties:
    id:
      type: string
      format: uuid
      description: Conversation identifier.
    title:
      type: string
      description: Conversation title.
    type:
      type: string
      enum:
        - DIRECT
      description: Conversation type.
    createdAt:
      type: string
      format: date-time
      description: Conversation creation timestamp (UTC).
    updatedAt:
      type: string
      format: date-time
      description: Last conversation update timestamp (UTC).
    lastMessageAt:
      type: string
      format: date-time
      description: Last message timestamp for list sorting (UTC).
    latestExecution:
      $ref: './chat-execution-dto.yml#/ChatExecutionDTO'
      nullable: true
