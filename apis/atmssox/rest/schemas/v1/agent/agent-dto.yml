AgentDTO:
  title: AgentDTO
  type: object
  additionalProperties: false
  required:
    - id
    - name
    - description
    - instruction
    - status
    - createdAt
    - updatedAt
  properties:
    id:
      type: string
      format: uuid
      description: Globally unique agent identifier.
    name:
      type: string
      description: Agent name.
    description:
      type: string
      nullable: true
      description: Agent description.
    instruction:
      type: string
      nullable: true
      description: Agent behavioral definition text.
    status:
      type: string
      description: Current agent status.
      enum:
        - DRAFT
        - ACTIVE
        - ARCHIVED
      example: ACTIVE
    createdAt:
      type: string
      format: date-time
      description: Agent creation timestamp (UTC).
    updatedAt:
      type: string
      format: date-time
      description: Last agent update timestamp (UTC).
