ChatExecutionDTO:
  title: ChatExecutionDTO
  type: object
  additionalProperties: false
  required:
    - executionId
    - conversationId
    - agentId
    - state
    - createdAt
  properties:
    executionId:
      type: string
      format: uuid
      description: Execution identifier.
    conversationId:
      type: string
      format: uuid
      description: Conversation identifier linked to this execution.
    agentId:
      type: string
      format: uuid
      description: Agent identifier that owns the execution.
    state:
      $ref: './execution-status-dto.yml#/ExecutionStatusDTO'
    createdAt:
      type: string
      format: date-time
      description: Execution creation timestamp (UTC).
    startedAt:
      type: string
      format: date-time
      nullable: true
      description: Execution start timestamp (UTC).
    completedAt:
      type: string
      format: date-time
      nullable: true
      description: Terminal execution timestamp (UTC).
    failure:
      nullable: true
      allOf:
        - $ref: './chat-execution-failure-dto.yml#/ChatExecutionFailureDTO'
    assistantMessage:
      nullable: true
      allOf:
        - $ref: './agent-conversation-message-dto.yml#/AgentConversationMessageDTO'
