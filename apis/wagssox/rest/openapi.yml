openapi: "3.0.0"
info:
  title: API Workspace Aggregation Service Sitionix
  description: API specification for workspace projection service
  version: 0.0.5
  contact:
    name: APP Sitionix
servers:
  - description: Localhost (dev only)
    url: "http://localhost:8080/wagssox"
tags:
  - name: Site
  - name: Domain
paths:
  /api/v1/sites:
    $ref: './paths/v1/sites.yml'
  /api/v1/sites/{siteId}/overview:
    $ref: './paths/v1/sites-overview.yml'
  /api/v1/domains:
    $ref: './paths/v1/domains.yml'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Service-to-service access token (Bearer).
  schemas:
    SiteOverviewDTO:
      $ref: './schemas/v1/site/site-overview-dto.yml#/SiteOverviewDTO'
    WorkspaceSitesPageDTO:
      $ref: './schemas/v1/site/workspace-sites-page-dto.yml#/WorkspaceSitesPageDTO'
    WorkspaceSiteCardDTO:
      $ref: './schemas/v1/site/workspace-site-card-dto.yml#/WorkspaceSiteCardDTO'
    WorkspaceDomainsPageDTO:
      $ref: './schemas/v1/domain/workspace-domains-page-dto.yml#/WorkspaceDomainsPageDTO'
    WorkspaceDomainDTO:
      $ref: './schemas/v1/domain/workspace-domain-dto.yml#/WorkspaceDomainDTO'
    PageMetaDTO:
      $ref: './schemas/v1/domain/page-meta-dto.yml#/PageMetaDTO'
    ErrorDTO:
      $ref: './schemas/v1/errors/error-dto.yml#/ErrorDTO'
  responses:
    BadRequest:
      $ref: './schemas/v1/errors/responses.yml#/BadRequest'
    NotFound:
      $ref: './schemas/v1/errors/responses.yml#/NotFound'
    Conflict:
      $ref: './schemas/v1/errors/responses.yml#/Conflict'
    Gone:
      $ref: './schemas/v1/errors/responses.yml#/Gone'
    InternalServerError:
      $ref: './schemas/v1/errors/responses.yml#/InternalServerError'
    Unauthorized:
      $ref: './schemas/v1/errors/responses.yml#/Unauthorized'
    Forbidden:
      $ref: './schemas/v1/errors/responses.yml#/Forbidden'
    TooManyRequests:
      $ref: './schemas/v1/errors/responses.yml#/TooManyRequests'
