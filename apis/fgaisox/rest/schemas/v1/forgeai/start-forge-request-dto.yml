StartForgeRequestDTO:
  type: object
  required:
    - ticket
    - task
    - serviceIds
  properties:
    ticket:
      type: string
      minLength: 1
      maxLength: 64
    task:
      type: string
      minLength: 1
      maxLength: 4000
    serviceIds:
      type: array
      minItems: 1
      items:
        type: string
        minLength: 1
