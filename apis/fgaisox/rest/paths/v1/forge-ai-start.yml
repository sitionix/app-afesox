post:
  tags:
    - ForgeAI
  summary: Start Forge AI task
  operationId: startForge
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../openapi.yml#/components/schemas/StartForgeRequestDTO'
  responses:
    '201':
      description: Forge AI task started
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/StartForgeResponseDTO'
    '400':
      $ref: '../../openapi.yml#/components/responses/BadRequest'
    '401':
      $ref: '../../openapi.yml#/components/responses/Unauthorized'
    '403':
      $ref: '../../openapi.yml#/components/responses/Forbidden'
    '500':
      $ref: '../../openapi.yml#/components/responses/InternalServerError'
