get:
  tags:
    - ForgeAiOperatorUi
  summary: Get Forge AI operator UI ticket graph
  operationId: getOperatorUiTicketGraph
  parameters:
    - in: path
      name: ticketId
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Operator UI ticket graph
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/OperatorUiTicketGraphResponseDTO'
    '400':
      $ref: '../../openapi.yml#/components/responses/BadRequest'
    '404':
      $ref: '../../openapi.yml#/components/responses/NotFound'
    '500':
      $ref: '../../openapi.yml#/components/responses/InternalServerError'
