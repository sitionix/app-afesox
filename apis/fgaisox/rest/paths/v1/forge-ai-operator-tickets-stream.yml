get:
  tags:
    - ForgeAiOperatorTicket
  summary: Stream ticket operator events
  operationId: streamOperatorTicket
  parameters:
    - in: path
      name: ticketId
      required: true
      schema:
        type: string
        format: uuid
    - in: query
      name: watcherId
      required: true
      schema:
        type: string
    - in: query
      name: verbosity
      required: false
      schema:
        type: string
        default: minimal
    - in: query
      name: stopOnWindowClose
      required: false
      schema:
        type: boolean
        default: true
    - in: query
      name: replay
      required: false
      schema:
        type: boolean
        default: true
  responses:
    '200':
      description: Ticket operator event stream
      content:
        application/x-ndjson:
          schema:
            type: string
            format: binary
    '400':
      $ref: '../../openapi.yml#/components/responses/BadRequest'
    '500':
      $ref: '../../openapi.yml#/components/responses/InternalServerError'
