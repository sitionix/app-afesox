openapi: "3.0.0"
info:
  title: API Forge AI Service Sitionix
  description: API specification for Forge AI service
  version: 0.0.11
  contact:
    name: APP Sitionix
servers:
  - description: Localhost (dev only)
    url: 'http://localhost:9099/fgaisox'
tags:
  - name: ForgeAI
paths:
  /api/v1/forge-ai/start:
    $ref: './paths/v1/forge-ai-start.yml'
  /api/v1/forge-ai/tickets/{ticketId}/lanes/{laneId}/analyzer/complete:
    $ref: './paths/v1/forge-ai-complete-analyzer-lane.yml'
  /api/v1/forge-ai/tickets/{ticketId}/lanes/{laneId}/architect/complete:
    $ref: './paths/v1/forge-ai-complete-architect-lane.yml'
  /api/v1/forge-ai/tickets/{ticketId}/lanes/{laneId}/api/complete:
    $ref: './paths/v1/forge-ai-complete-api-lane.yml'
  /api/v1/forge-ai/tickets/{ticketId}/lanes/{laneId}/implement-be/complete:
    $ref: './paths/v1/forge-ai-complete-implement-be-lane.yml'
  /api/v1/forge-ai/tickets/{ticketId}/lanes/{laneId}/qa-lead/complete:
    $ref: './paths/v1/forge-ai-complete-qa-lead-lane.yml'
  /api/v1/forge-ai/tickets/{ticketId}/lanes/{laneId}/test-unit/complete:
    $ref: './paths/v1/forge-ai-complete-unit-test-lane.yml'
  /api/v1/forge-ai/tickets/{ticketId}/lanes/{laneId}/test-it/complete:
    $ref: './paths/v1/forge-ai-complete-it-test-lane.yml'
  /api/v1/forge-ai/tickets/{ticketId}/lanes/{laneId}/test-ui/complete:
    $ref: './paths/v1/forge-ai-complete-ui-test-lane.yml'
