openapi: "3.0.0"
info:
  title: API Forge AI Service Sitionix
  description: API specification for Forge AI service
  version: 0.0.5
  contact:
    name: APP Sitionix
servers:
  - description: Localhost (dev only)
    url: 'http://localhost:9099/fgaisox'
tags:
  - name: ForgeAI
paths:
  /api/v1/forge-ai/start:
    $ref: './paths/v1/forge-ai-start.yml'
  /api/v1/forge-ai/tickets/{ticketId}/lanes/{laneId}/analyzer/complete:
    $ref: './paths/v1/forge-ai-complete-analyzer-lane.yml'
  /api/v1/forge-ai/tickets/{ticketId}/lanes/{laneId}/architect/complete:
    $ref: './paths/v1/forge-ai-complete-architect-lane.yml'
  /api/v1/forge-ai/tickets/{ticketId}/lanes/{laneId}/api/complete:
    $ref: './paths/v1/forge-ai-complete-api-lane.yml'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Service-to-service access token (Bearer).
  schemas:
    StartForgeRequestDTO:
      $ref: './schemas/v1/forgeai/start-forge-request-dto.yml#/StartForgeRequestDTO'
    StartForgeResponseDTO:
      $ref: './schemas/v1/forgeai/start-forge-response-dto.yml#/StartForgeResponseDTO'
    CompleteAnalyzerLaneRequestDTO:
      $ref: './schemas/v1/forgeai/complete-analyzer-lane-request-dto.yml#/CompleteAnalyzerLaneRequestDTO'
    AnalyzerArchitectHandoffDTO:
      $ref: './schemas/v1/forgeai/analyzer-architect-handoff-dto.yml#/AnalyzerArchitectHandoffDTO'
    AnalyzerQaLeadHandoffDTO:
      $ref: './schemas/v1/forgeai/analyzer-qa-lead-handoff-dto.yml#/AnalyzerQaLeadHandoffDTO'
    CompleteAnalyzerLaneResponseDTO:
      $ref: './schemas/v1/forgeai/complete-analyzer-lane-response-dto.yml#/CompleteAnalyzerLaneResponseDTO'
    CompleteArchitectLaneRequest:
      $ref: './schemas/v1/forgeai/complete-architect-lane-request.yml#/CompleteArchitectLaneRequest'
    ArchitectImplementationHandoff:
      $ref: './schemas/v1/forgeai/architect-implementation-handoff.yml#/ArchitectImplementationHandoff'
    ArchitectApiRequest:
      $ref: './schemas/v1/forgeai/architect-api-request.yml#/ArchitectApiRequest'
    ArchitectApiOperation:
      $ref: './schemas/v1/forgeai/architect-api-operation.yml#/ArchitectApiOperation'
    ArchitectApiParameter:
      $ref: './schemas/v1/forgeai/architect-api-parameter.yml#/ArchitectApiParameter'
    ArchitectApiPayloadShape:
      $ref: './schemas/v1/forgeai/architect-api-payload-shape.yml#/ArchitectApiPayloadShape'
    ArchitectApiField:
      $ref: './schemas/v1/forgeai/architect-api-field.yml#/ArchitectApiField'
    ArchitectEventRequest:
      $ref: './schemas/v1/forgeai/architect-event-request.yml#/ArchitectEventRequest'
    ArchitectEventPayloadField:
      $ref: './schemas/v1/forgeai/architect-event-payload-field.yml#/ArchitectEventPayloadField'
    CompleteArchitectLaneResponse:
      $ref: './schemas/v1/forgeai/complete-architect-lane-response.yml#/CompleteArchitectLaneResponse'
    CompleteApiLaneRequest:
      $ref: './schemas/v1/forgeai/complete-api-lane-request.yml#/CompleteApiLaneRequest'
    ApiLaneContractResult:
      $ref: './schemas/v1/forgeai/api-lane-contract-result.yml#/ApiLaneContractResult'
    ApiLaneGeneratedArtifact:
      $ref: './schemas/v1/forgeai/api-lane-generated-artifact.yml#/ApiLaneGeneratedArtifact'
    CompleteApiLaneResponse:
      $ref: './schemas/v1/forgeai/complete-api-lane-response.yml#/CompleteApiLaneResponse'
    AgentDTO:
      $ref: './schemas/shared/agent-dto.yml#/AgentDTO'
    ErrorDTO:
      $ref: '../../common/rest/error/error-dto.yml#/ErrorDTO'
  responses:
    BadRequest:
      $ref: '../../common/rest/error/responses.yml#/BadRequest'
    NotFound:
      $ref: '../../common/rest/error/responses.yml#/NotFound'
    Conflict:
      $ref: '../../common/rest/error/responses.yml#/Conflict'
    Unauthorized:
      $ref: '../../common/rest/error/responses.yml#/Unauthorized'
    Forbidden:
      $ref: '../../common/rest/error/responses.yml#/Forbidden'
    InternalServerError:
      $ref: '../../common/rest/error/responses.yml#/InternalServerError'
