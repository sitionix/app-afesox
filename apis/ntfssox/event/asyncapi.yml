asyncapi: 2.0.0
info:
  title: EVENT NTFSSOX
  version: 0.0.1
  description: Events for NTFSSOX

defaultContentType: application/*+avro

channels:
  ntfssox.${environment}.notification.public.unified.v1:
    description: Notification event topic

    publish:
      summary: Publish notification event
      operationId: publishNotificationEvent
      tags:
        - name: NotificationEvent
      bindings:
        kafka:
          bindingVersion: 'latest'
      x-itx-metadata-version: v1
      x-itx-envelop-namespace: com.app_afesox.ntfssox.events.notifications
      x-itx-envelop-name: NotificationEnvelope
      message:
        $ref: '#/components/messages/NotificationEnvelope'

    subscribe:
      summary: Subscribe to notification event
      operationId: subscribeNotificationEvent
      tags:
        - name: NotificationEvent
      bindings:
        kafka:
          bindingVersion: 'latest'
      x-itx-metadata-version: v1
      x-itx-envelop-namespace: com.app_afesox.ntfssox.events.notifications
      x-itx-envelop-name: NotificationEnvelope
      message:
        $ref: '#/components/messages/NotificationEnvelope'

components:
  messages:
    NotificationEnvelope:
      name: NotificationEnvelope
      title: Notification envelope
      summary: Universal notification envelope payload
      contentType: application/*+avro
      schemaFormat: application/vnd.apache.avro+json;version=1.0.0
      payload:
        $ref: "notifications/v1/notification_envelope.avsc"
