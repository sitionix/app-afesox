get:
  tags:
    - AgentConversation
  operationId: getAgentConversations
  summary: Get agent conversations
  description: >
    Returns active direct conversations for current user scoped to one agent,
    sorted by lastMessageAt descending.
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: agentId
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Agent conversation list
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/AgentConversationsResponseDTO'
    '401':
      $ref: '../../openapi.yml#/components/responses/Unauthorized'
    '403':
      $ref: '../../openapi.yml#/components/responses/Forbidden'
    '404':
      $ref: '../../openapi.yml#/components/responses/NotFound'
    '500':
      $ref: '../../openapi.yml#/components/responses/InternalServerError'
