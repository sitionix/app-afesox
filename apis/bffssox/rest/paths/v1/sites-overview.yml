get:
  tags:
    - Site
  operationId: getSiteOverview
  summary: Get site overview
  description: >
    Returns overview summary data for a single site owned by the authenticated user.
    At the current stage, response includes only the core site overview block.
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: siteId
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Site overview
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/SiteOverviewDTO'
    '400':
      $ref: '../../openapi.yml#/components/responses/BadRequest'
    '401':
      $ref: '../../openapi.yml#/components/responses/Unauthorized'
    '403':
      $ref: '../../openapi.yml#/components/responses/Forbidden'
    '404':
      $ref: '../../openapi.yml#/components/responses/NotFound'
    '500':
      $ref: '../../openapi.yml#/components/responses/InternalServerError'
