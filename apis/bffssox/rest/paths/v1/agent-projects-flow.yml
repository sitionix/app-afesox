get:
  tags:
    - AgentProject
  operationId: getAgentProjectFlow
  summary: Get agent project flow
  description: >
    Returns persisted flow graph for the visible project.
    Returns 404 when project is missing, deleted, or not visible for current user.
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: projectId
      required: true
      schema:
        type: string
        format: uuid
  responses:
    200:
      description: Agent project flow graph
      content:
        application/json:
          schema:
            $ref: ../../openapi.yml#/components/schemas/AgentProjectFlowResponseDTO
    400:
      $ref: ../../openapi.yml#/components/responses/BadRequest
    401:
      $ref: ../../openapi.yml#/components/responses/Unauthorized
    404:
      $ref: ../../openapi.yml#/components/responses/NotFound
    500:
      $ref: ../../openapi.yml#/components/responses/InternalServerError
