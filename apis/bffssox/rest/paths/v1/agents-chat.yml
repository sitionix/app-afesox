post:
  tags:
    - Agent
  operationId: chatAgent
  summary: Send agent chat message
  deprecated: true
  description: >
    Executes direct chat message flow for one automation agent.
    Creates conversation on first send when conversationId is absent.
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: agentId
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../openapi.yml#/components/schemas/ChatAgentRequestDTO'
  responses:
    '200':
      description: Persisted assistant reply
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/ChatAgentResponseDTO'
    '400':
      $ref: '../../openapi.yml#/components/responses/BadRequest'
    '401':
      $ref: '../../openapi.yml#/components/responses/Unauthorized'
    '403':
      $ref: '../../openapi.yml#/components/responses/Forbidden'
    '404':
      $ref: '../../openapi.yml#/components/responses/NotFound'
    '409':
      $ref: '../../openapi.yml#/components/responses/Conflict'
    '500':
      $ref: '../../openapi.yml#/components/responses/InternalServerError'
