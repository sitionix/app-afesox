get:
  tags:
    - AgentChat
  operationId: getAgentChatExecution
  summary: Get async agent chat execution
  description: >
    Returns current execution lifecycle state and terminal result by execution identifier.
    When conversationId is provided, it must match execution's conversationId.
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: agentId
      required: true
      schema:
        type: string
        format: uuid
    - in: path
      name: executionId
      required: true
      schema:
        type: string
        format: uuid
    - in: query
      name: conversationId
      required: false
      schema:
        type: string
        format: uuid
      description: Optional conversation consistency guard.
  responses:
    '200':
      description: Chat execution state and result
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/ChatExecutionDTO'
    '400':
      $ref: '../../openapi.yml#/components/responses/BadRequest'
    '401':
      $ref: '../../openapi.yml#/components/responses/Unauthorized'
    '403':
      $ref: '../../openapi.yml#/components/responses/Forbidden'
    '404':
      $ref: '../../openapi.yml#/components/responses/NotFound'
    '409':
      $ref: '../../openapi.yml#/components/responses/Conflict'
    '500':
      $ref: '../../openapi.yml#/components/responses/InternalServerError'
