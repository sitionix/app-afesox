get:
  tags:
    - AgentConversation
  operationId: getProjectConversation
  summary: Get project conversation shell details
  description: >
    Returns one project-bound conversation shell for current user and project.
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: projectId
      required: true
      schema:
        type: string
        format: uuid
    - in: path
      name: conversationId
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Project conversation shell details
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/ProjectConversationDetailsDTO'
    '401':
      $ref: '../../openapi.yml#/components/responses/Unauthorized'
    '404':
      $ref: '../../openapi.yml#/components/responses/NotFound'
    '500':
      $ref: '../../openapi.yml#/components/responses/InternalServerError'
