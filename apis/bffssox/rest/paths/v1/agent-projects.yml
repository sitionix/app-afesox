get:
  tags:
    - AgentProject
  operationId: getAgentProjects
  summary: Get automation projects
  description: >
    Returns a paginated list of automation projects visible in workspace for the authenticated user.
    Projects in `DELETED` status are excluded from standard list flow.
  security:
    - bearerAuth: []
  parameters:
    - in: query
      name: page
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
    - in: query
      name: size
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
  responses:
    '200':
      description: Agent projects page
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/AgentProjectsPageResponseDTO'
    '400':
      $ref: '../../openapi.yml#/components/responses/BadRequest'
    '401':
      $ref: '../../openapi.yml#/components/responses/Unauthorized'
    '403':
      $ref: '../../openapi.yml#/components/responses/Forbidden'
    '500':
      $ref: '../../openapi.yml#/components/responses/InternalServerError'
post:
  tags:
    - AgentProject
  operationId: createAgentProject
  summary: Create automation project
  description: >
    Creates one automation project for the authenticated user.
    New projects are created with initial `ACTIVE` status.
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../openapi.yml#/components/schemas/CreateAgentProjectRequestDTO'
  responses:
    '201':
      description: Agent project created
      content:
        application/json:
          schema:
            $ref: '../../openapi.yml#/components/schemas/AgentProjectDTO'
    '400':
      $ref: '../../openapi.yml#/components/responses/BadRequest'
    '401':
      $ref: '../../openapi.yml#/components/responses/Unauthorized'
    '403':
      $ref: '../../openapi.yml#/components/responses/Forbidden'
    '500':
      $ref: '../../openapi.yml#/components/responses/InternalServerError'
