ChatAgentRequestDTO:
  title: ChatAgentRequestDTO
  type: object
  additionalProperties: false
  required:
    - clientRequestId
    - message
  properties:
    clientRequestId:
      type: string
      format: uuid
      description: >
        Idempotency key generated by client per submit intent.
        Reusing the same key for an in-flight execution returns the same execution reference.
    conversationId:
      type: string
      format: uuid
      description: Existing conversation identifier for continue-chat flow.
    message:
      type: string
      minLength: 1
      pattern: ".*\\S.*"
      description: User message to persist and execute.
      example: Explain clean architecture in simple words.
