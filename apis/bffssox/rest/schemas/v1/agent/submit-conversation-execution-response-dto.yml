SubmitConversationExecutionResponseDTO:
  title: SubmitConversationExecutionResponseDTO
  type: object
  additionalProperties: false
  required:
    - conversationId
    - inputMessageId
    - runtimeDispatched
  properties:
    conversationId:
      type: string
      format: uuid
      description: Conversation identifier linked to this execution.
    inputMessageId:
      type: string
      format: uuid
      description: User message identifier persisted during submit transaction.
    runtimeDispatched:
      type: boolean
      description: Indicates whether runtime execution dispatch was created.
    executionId:
      type: string
      format: uuid
      nullable: true
      description: Execution identifier only when runtime dispatch created execution.
    executionStatus:
      $ref: './execution-status-dto.yml#/ExecutionStatusDTO'
      description: Real execution lifecycle status only when execution exists.
