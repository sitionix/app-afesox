AgentProjectFlowNodeDTO:
  title: AgentProjectFlowNodeDTO
  type: object
  additionalProperties: false
  required:
    - id
    - nodeType
    - referenceId
    - label
    - position
    - designStatus
    - config
  properties:
    id:
      type: string
      description: Flow node identifier.
    nodeType:
      type: string
      description: Node type used by the flow renderer.
    referenceId:
      type: string
      description: Source reference identifier used by this node.
    label:
      type: string
      description: Human-readable node label.
    position:
      $ref: '../../../openapi.yml#/components/schemas/AgentProjectFlowNodePositionDTO'
    designStatus:
      type: string
      description: Design-time node status metadata, not runtime execution status.
    config:
      type: object
      additionalProperties: true
      description: Opaque read-only node configuration metadata.
