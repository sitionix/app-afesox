AgentProjectFlowPaletteItemDTO:
  title: AgentProjectFlowPaletteItemDTO
  type: object
  additionalProperties: false
  required:
    - sourceType
    - referenceId
    - label
    - description
    - nodeType
    - sourceStatus
  properties:
    sourceType:
      type: string
      description: Palette item source type.
      enum:
        - USER
        - AGENT
    referenceId:
      type: string
      description: Palette source reference identifier.
    label:
      type: string
      description: Label shown in the palette.
    description:
      type: string
      description: Palette item description.
    nodeType:
      type: string
      description: Node type used when representing this palette item.
    sourceStatus:
      type: string
      description: Source status shown for this palette item.
