CreateAgentRuleRequestDTO:
  title: CreateAgentRuleRequestDTO
  type: object
  additionalProperties: false
  required:
    - title
    - content
  properties:
    title:
      type: string
      minLength: 1
      pattern: ".*\\S.*"
      description: Rule title. Value is trimmed before validation.
      example: Language preference
    content:
      type: string
      minLength: 1
      pattern: ".*\\S.*"
      description: Rule content. Value is trimmed before validation.
      example: Always answer in Ukrainian unless user explicitly asks otherwise.
