type: object
required:
  - email
  - role
  - password
properties:
  password:
    type: string
    minLength: 1
    maxLength: 128
    pattern: ".*\\S.*"
    example: qwerty1234
  email:
    type: string
    format: email
    minLength: 1
    maxLength: 254
    pattern: ".*\\S.*"
    example: some@sitionix.com
  siteId:
    type: string
    format: uuid
    example: c9b1f3f4-12c7-11ec-82a8-0242ac130003
  role:
    type: string
    format: enum
    enum:
      - SUPER_ADMIN
      - ECOSYSTEM_OWNER
      - SITE_ADMIN
      - SITE_USER
