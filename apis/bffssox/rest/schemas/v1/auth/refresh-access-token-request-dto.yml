RefreshAccessTokenRequestDTO:
  title: RefreshAccessTokenRequestDTO
  type: object
  additionalProperties: false
  required:
    - sessionSourceId
  properties:
    sessionSourceId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ".*\\S.*"
      description: >
        Opaque device/browser identifier generated by the client and persisted locally.
        Must map to an existing ACTIVE device session for this user.
