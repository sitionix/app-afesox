openapi: "3.0.0"
info:
  title: API Backend for Frontend Sitionix
  description: API specification for the BFF authentication facade
  version: 0.0.38
  contact:
    name: APP Sitionix
servers:
  - description: Localhost (dev only)
    url: 'http://localhost:8080/bffssox'
tags:
  - name: Auth
  - name: User
  - name: Site
  - name: Agent
  - name: AgentProject
  - name: AgentConversation
  - name: AgentRule
  - name: AgentChat
paths:
  /api/v1/auth/refresh:
    $ref: './paths/v1/auth-refresh.yml'
  /api/v1/auth/email/verify:
    $ref: './paths/v1/auth-email-verify.yml'
  /api/v1/auth/email/verify/resend:
    $ref: './paths/v1/auth-email-verify-resend.yml'
  /api/v1/users:
    $ref: './paths/v1/users.yml'
  /api/v1/sites:
    $ref: './paths/v1/sites.yml'
  /api/v1/sites/{siteId}/overview:
    $ref: './paths/v1/sites-overview.yml'
  /api/v1/agents:
    $ref: './paths/v1/agents.yml'
  /api/v1/agent-projects:
    $ref: './paths/v1/agent-projects.yml'
  /api/v1/agent-projects/{projectId}:
    $ref: './paths/v1/agent-projects-by-id.yml'
  /api/v1/agent-projects/{projectId}/agents:
    $ref: './paths/v1/agent-projects-agents.yml'
  /api/v1/agent-projects/{projectId}/agents/{agentId}:
    $ref: './paths/v1/agent-projects-agents-by-id.yml'
  /api/v1/agents/{agentId}:
    $ref: './paths/v1/agents-by-id.yml'
  /api/v1/agents/{agentId}/activate:
    $ref: './paths/v1/agents-activate.yml'
  /api/v1/agents/{agentId}/archive:
    $ref: './paths/v1/agents-archive.yml'
  /api/v1/agents/{agentId}/restore:
    $ref: './paths/v1/agents-restore.yml'
  /api/v1/agents/{agentId}/chat:
    $ref: './paths/v1/agents-chat.yml'
  /api/v1/agents/{agentId}/chat/executions:
    $ref: './paths/v1/agents-chat-executions.yml'
  /api/v1/agents/{agentId}/chat/executions/{executionId}:
    $ref: './paths/v1/agents-chat-executions-by-id.yml'
  /api/v1/agents/{agentId}/rules:
    $ref: './paths/v1/agents-rules.yml'
  /api/v1/agents/{agentId}/rules/{ruleId}:
    $ref: './paths/v1/agents-rules-by-id.yml'
  /api/v1/agents/{agentId}/rules/{ruleId}/accept:
    $ref: './paths/v1/agents-rules-accept.yml'
  /api/v1/agents/{agentId}/rules/{ruleId}/reject:
    $ref: './paths/v1/agents-rules-reject.yml'
  /api/v1/agents/{agentId}/conversations:
    $ref: './paths/v1/agents-conversations.yml'
  /api/v1/conversations/{conversationId}:
    $ref: './paths/v1/agents-conversations-by-id.yml'
  /api/v1/auth/login:
    $ref: './paths/v1/auth-login.yml'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: User access token (Bearer).
  schemas:
    RefreshAccessTokenRequestDTO:
      $ref: './schemas/v1/auth/refresh-access-token-request-dto.yml#/RefreshAccessTokenRequestDTO'
    RefreshAccessTokenResponseDTO:
      $ref: './schemas/v1/auth/refresh-access-token-response-dto.yml#/RefreshAccessTokenResponseDTO'
    EmailVerificationResponseDTO:
      $ref: './schemas/v1/auth/email-verification-response-dto.yml#/EmailVerificationResponseDTO'
    EmailVerificationDTO:
      $ref: './schemas/v1/auth/email-verification-dto.yml#/EmailVerificationDTO'
    ResendEmailVerificationRequestDTO:
      $ref: './schemas/v1/auth/resend-email-verification-request-dto.yml#/ResendEmailVerificationRequestDTO'
    ResendEmailVerificationResponseDTO:
      $ref: './schemas/v1/auth/resend-email-verification-response-dto.yml#/ResendEmailVerificationResponseDTO'
    ResponseRegisterUserDTO:
      $ref: './schemas/v1/user/response-register-user-dto.yml#/ResponseRegisterUserDTO'
    RegisterUserDTO:
      $ref: './schemas/v1/user/register-user-dto.yml#/RegisterUserDTO'
    CreateSiteRequestDTO:
      $ref: './schemas/v1/site/create-site-request-dto.yml#/CreateSiteRequestDTO'
    CreateSiteResponseDTO:
      $ref: './schemas/v1/site/create-site-response-dto.yml#/CreateSiteResponseDTO'
    CreateAgentRequestDTO:
      $ref: './schemas/v1/agent/create-agent-request-dto.yml#/CreateAgentRequestDTO'
    CreateAgentProjectRequestDTO:
      $ref: './schemas/v1/agent/create-agent-project-request-dto.yml#/CreateAgentProjectRequestDTO'
    PatchAgentRequestDTO:
      $ref: './schemas/v1/agent/patch-agent-request-dto.yml#/PatchAgentRequestDTO'
    PatchAgentProjectRequestDTO:
      $ref: './schemas/v1/agent/patch-agent-project-request-dto.yml#/PatchAgentProjectRequestDTO'
    AddAgentToProjectRequestDTO:
      $ref: './schemas/v1/agent/add-agent-to-project-request-dto.yml#/AddAgentToProjectRequestDTO'
    AgentDTO:
      $ref: './schemas/v1/agent/agent-dto.yml#/AgentDTO'
    AgentProjectDTO:
      $ref: './schemas/v1/agent/agent-project-dto.yml#/AgentProjectDTO'
    AgentProjectsPageResponseDTO:
      $ref: './schemas/v1/agent/agent-projects-page-response-dto.yml#/AgentProjectsPageResponseDTO'
    ProjectAgentResponseDTO:
      $ref: './schemas/v1/agent/project-agent-response-dto.yml#/ProjectAgentResponseDTO'
    ProjectAgentsResponseDTO:
      $ref: './schemas/v1/agent/project-agents-response-dto.yml#/ProjectAgentsResponseDTO'
    AgentProjectStatusDTO:
      $ref: './schemas/v1/agent/agent-project-status-dto.yml#/AgentProjectStatusDTO'
    AgentsResponseDTO:
      $ref: './schemas/v1/agent/agents-response-dto.yml#/AgentsResponseDTO'
    ChatAgentRequestDTO:
      $ref: './schemas/v1/agent/chat-agent-request-dto.yml#/ChatAgentRequestDTO'
    ChatAgentResponseDTO:
      $ref: './schemas/v1/agent/chat-agent-response-dto.yml#/ChatAgentResponseDTO'
    SubmitChatExecutionResponseDTO:
      $ref: './schemas/v1/agent/submit-chat-execution-response-dto.yml#/SubmitChatExecutionResponseDTO'
    ChatExecutionDTO:
      $ref: './schemas/v1/agent/chat-execution-dto.yml#/ChatExecutionDTO'
    ChatExecutionFailureDTO:
      $ref: './schemas/v1/agent/chat-execution-failure-dto.yml#/ChatExecutionFailureDTO'
    ExecutionStatusDTO:
      $ref: './schemas/v1/agent/execution-status-dto.yml#/ExecutionStatusDTO'
    AgentConversationDTO:
      $ref: './schemas/v1/agent/agent-conversation-dto.yml#/AgentConversationDTO'
    AgentConversationMessageDTO:
      $ref: './schemas/v1/agent/agent-conversation-message-dto.yml#/AgentConversationMessageDTO'
    AgentConversationsResponseDTO:
      $ref: './schemas/v1/agent/agent-conversations-response-dto.yml#/AgentConversationsResponseDTO'
    AgentConversationDetailsDTO:
      $ref: './schemas/v1/agent/agent-conversation-details-dto.yml#/AgentConversationDetailsDTO'
    AgentRuleDTO:
      $ref: './schemas/v1/agent/agent-rule-dto.yml#/AgentRuleDTO'
    AgentRuleStatusDTO:
      $ref: './schemas/v1/agent/agent-rule-status-dto.yml#/AgentRuleStatusDTO'
    AgentRuleAuthorTypeDTO:
      $ref: './schemas/v1/agent/agent-rule-author-type-dto.yml#/AgentRuleAuthorTypeDTO'
    AgentRulesResponseDTO:
      $ref: './schemas/v1/agent/agent-rules-response-dto.yml#/AgentRulesResponseDTO'
    CreateAgentRuleRequestDTO:
      $ref: './schemas/v1/agent/create-agent-rule-request-dto.yml#/CreateAgentRuleRequestDTO'
    PatchAgentRuleRequestDTO:
      $ref: './schemas/v1/agent/patch-agent-rule-request-dto.yml#/PatchAgentRuleRequestDTO'
    AcceptAgentRuleRequestDTO:
      $ref: './schemas/v1/agent/accept-agent-rule-request-dto.yml#/AcceptAgentRuleRequestDTO'
    DeleteAgentRuleResponseDTO:
      $ref: './schemas/v1/agent/delete-agent-rule-response-dto.yml#/DeleteAgentRuleResponseDTO'
    WorkspaceSitesResponseDTO:
      $ref: './schemas/v1/site/workspace-sites-response-dto.yml#/WorkspaceSitesResponseDTO'
    SiteOverviewDTO:
      $ref: './schemas/v1/site/site-overview-dto.yml#/SiteOverviewDTO'
    WorkspaceSiteCardResponseDTO:
      $ref: './schemas/v1/site/workspace-site-card-response-dto.yml#/WorkspaceSiteCardResponseDTO'
    LoginRequestDTO:
      $ref: './schemas/v1/auth/login-request-dto.yml#/LoginRequestDTO'
    LoginResponseDTO:
      $ref: './schemas/v1/auth/login-response-dto.yml#/LoginResponseDTO'
    ErrorDTO:
      $ref: '../../common/rest/error/error-dto.yml#/ErrorDTO'
  responses:
    BadRequest:
      $ref: '../../common/rest/error/responses.yml#/BadRequest'
    NotFound:
      $ref: '../../common/rest/error/responses.yml#/NotFound'
    Conflict:
      $ref: '../../common/rest/error/responses.yml#/Conflict'
    Gone:
      $ref: '../../common/rest/error/responses.yml#/Gone'
    InternalServerError:
      $ref: '../../common/rest/error/responses.yml#/InternalServerError'
    Unauthorized:
      $ref: '../../common/rest/error/responses.yml#/Unauthorized'
    Forbidden:
      $ref: '../../common/rest/error/responses.yml#/Forbidden'
    TooManyRequests:
      $ref: '../../common/rest/error/responses.yml#/TooManyRequests'
