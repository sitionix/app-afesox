openapi: "3.0.0"
info:
  title: API Backend for Frontend Sitionix
  description: API specification for the BFF authentication facade
  version: 0.0.15
  contact:
    name: APP Sitionix
servers:
  - description: Localhost (dev only)
    url: 'http://localhost:8080/bffssox'
tags:
  - name: Auth
  - name: User
  - name: Site
paths:
  /api/v1/auth/refresh:
    $ref: './paths/v1/auth-refresh.yml'
  /api/v1/auth/email/verify:
    $ref: './paths/v1/auth-email-verify.yml'
  /api/v1/auth/email/verify/resend:
    $ref: './paths/v1/auth-email-verify-resend.yml'
  /api/v1/users:
    $ref: './paths/v1/users.yml'
  /api/v1/sites:
    $ref: './paths/v1/sites.yml'
  /api/v1/sites/{siteId}/overview:
    $ref: './paths/v1/sites-overview.yml'
  /api/v1/auth/login:
    $ref: './paths/v1/auth-login.yml'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: User access token (Bearer).
  schemas:
    RefreshAccessTokenRequestDTO:
      allOf:
        - $ref: './schemas/v1/auth/refresh-access-token-request.yml'
    RefreshAccessTokenResponseDTO:
      allOf:
        - $ref: './schemas/v1/auth/refresh-access-token-response.yml'
    EmailVerificationResponseDTO:
      allOf:
        - $ref: './schemas/v1/auth/email-verification-response.yml'
    EmailVerificationDTO:
      allOf:
        - $ref: './schemas/v1/auth/email-verification-request.yml'
    ResendEmailVerificationRequestDTO:
      $ref: './schemas/v1/auth/resend-email-verification-request.yml'
    ResendEmailVerificationResponseDTO:
      allOf:
        - $ref: './schemas/v1/auth/resend-email-verification-response.yml'
    ResponseRegisterUserDTO:
      allOf:
        - $ref: './schemas/v1/user/register-user-response.yml'
    RegisterUserDTO:
      allOf:
        - $ref: './schemas/v1/user/register-user-request.yml'
    CreateSiteRequestDTO:
      allOf:
        - $ref: './schemas/v1/site/create-site-request.yml'
    CreateSiteResponseDTO:
      allOf:
        - $ref: './schemas/v1/site/create-site-response.yml'
    WorkspaceSitesResponseDTO:
      allOf:
        - $ref: './schemas/v1/site/workspace-sites-response.yml'
    SiteOverviewDTO:
      allOf:
        - $ref: './schemas/v1/site/site-overview.yml'
    WorkspaceSiteCardResponseDTO:
      allOf:
        - $ref: './schemas/v1/site/workspace-site-card-response.yml'
    LoginRequestDTO:
      allOf:
        - $ref: './schemas/v1/auth/login-request.yml'
    LoginResponseDTO:
      allOf:
        - $ref: './schemas/v1/auth/login-response.yml'
    ErrorDTO:
      allOf:
        - $ref: './schemas/v1/errors/error-response.yml'
  responses:
    BadRequest:
      $ref: './schemas/v1/errors/responses.yml#/BadRequest'
    NotFound:
      $ref: './schemas/v1/errors/responses.yml#/NotFound'
    Conflict:
      $ref: './schemas/v1/errors/responses.yml#/Conflict'
    Gone:
      $ref: './schemas/v1/errors/responses.yml#/Gone'
    InternalServerError:
      $ref: './schemas/v1/errors/responses.yml#/InternalServerError'
    Unauthorized:
      $ref: './schemas/v1/errors/responses.yml#/Unauthorized'
    Forbidden:
      $ref: './schemas/v1/errors/responses.yml#/Forbidden'
    TooManyRequests:
      $ref: './schemas/v1/errors/responses.yml#/TooManyRequests'
