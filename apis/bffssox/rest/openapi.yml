openapi: "3.0.0"
info:
  title: API Backend for Frontend Sitionix
  description: API specification for the BFF authentication facade
  version: 0.0.25
  contact:
    name: APP Sitionix
servers:
  - description: Localhost (dev only)
    url: 'http://localhost:8080/bffssox'
tags:
  - name: Auth
  - name: User
  - name: Site
  - name: Agent
paths:
  /api/v1/auth/refresh:
    $ref: './paths/v1/auth-refresh.yml'
  /api/v1/auth/email/verify:
    $ref: './paths/v1/auth-email-verify.yml'
  /api/v1/auth/email/verify/resend:
    $ref: './paths/v1/auth-email-verify-resend.yml'
  /api/v1/users:
    $ref: './paths/v1/users.yml'
  /api/v1/sites:
    $ref: './paths/v1/sites.yml'
  /api/v1/sites/{siteId}/overview:
    $ref: './paths/v1/sites-overview.yml'
  /api/v1/agents:
    $ref: './paths/v1/agents.yml'
  /api/v1/agents/{agentId}:
    $ref: './paths/v1/agents-by-id.yml'
  /api/v1/agents/{agentId}/activate:
    $ref: './paths/v1/agents-activate.yml'
  /api/v1/agents/{agentId}/archive:
    $ref: './paths/v1/agents-archive.yml'
  /api/v1/agents/{agentId}/restore:
    $ref: './paths/v1/agents-restore.yml'
  /api/v1/auth/login:
    $ref: './paths/v1/auth-login.yml'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: User access token (Bearer).
  schemas:
    RefreshAccessTokenRequestDTO:
      $ref: './schemas/v1/auth/refresh-access-token-request-dto.yml#/RefreshAccessTokenRequestDTO'
    RefreshAccessTokenResponseDTO:
      $ref: './schemas/v1/auth/refresh-access-token-response-dto.yml#/RefreshAccessTokenResponseDTO'
    EmailVerificationResponseDTO:
      $ref: './schemas/v1/auth/email-verification-response-dto.yml#/EmailVerificationResponseDTO'
    EmailVerificationDTO:
      $ref: './schemas/v1/auth/email-verification-dto.yml#/EmailVerificationDTO'
    ResendEmailVerificationRequestDTO:
      $ref: './schemas/v1/auth/resend-email-verification-request-dto.yml#/ResendEmailVerificationRequestDTO'
    ResendEmailVerificationResponseDTO:
      $ref: './schemas/v1/auth/resend-email-verification-response-dto.yml#/ResendEmailVerificationResponseDTO'
    ResponseRegisterUserDTO:
      $ref: './schemas/v1/user/response-register-user-dto.yml#/ResponseRegisterUserDTO'
    RegisterUserDTO:
      $ref: './schemas/v1/user/register-user-dto.yml#/RegisterUserDTO'
    CreateSiteRequestDTO:
      $ref: './schemas/v1/site/create-site-request-dto.yml#/CreateSiteRequestDTO'
    CreateSiteResponseDTO:
      $ref: './schemas/v1/site/create-site-response-dto.yml#/CreateSiteResponseDTO'
    CreateAgentRequestDTO:
      $ref: './schemas/v1/agent/create-agent-request-dto.yml#/CreateAgentRequestDTO'
    PatchAgentRequestDTO:
      $ref: './schemas/v1/agent/patch-agent-request-dto.yml#/PatchAgentRequestDTO'
    AgentDTO:
      $ref: './schemas/v1/agent/agent-dto.yml#/AgentDTO'
    AgentsResponseDTO:
      $ref: './schemas/v1/agent/agents-response-dto.yml#/AgentsResponseDTO'
    WorkspaceSitesResponseDTO:
      $ref: './schemas/v1/site/workspace-sites-response-dto.yml#/WorkspaceSitesResponseDTO'
    SiteOverviewDTO:
      $ref: './schemas/v1/site/site-overview-dto.yml#/SiteOverviewDTO'
    WorkspaceSiteCardResponseDTO:
      $ref: './schemas/v1/site/workspace-site-card-response-dto.yml#/WorkspaceSiteCardResponseDTO'
    LoginRequestDTO:
      $ref: './schemas/v1/auth/login-request-dto.yml#/LoginRequestDTO'
    LoginResponseDTO:
      $ref: './schemas/v1/auth/login-response-dto.yml#/LoginResponseDTO'
    ErrorDTO:
      $ref: '../../common/rest/error/error-dto.yml#/ErrorDTO'
  responses:
    BadRequest:
      $ref: '../../common/rest/error/responses.yml#/BadRequest'
    NotFound:
      $ref: '../../common/rest/error/responses.yml#/NotFound'
    Conflict:
      $ref: '../../common/rest/error/responses.yml#/Conflict'
    Gone:
      $ref: '../../common/rest/error/responses.yml#/Gone'
    InternalServerError:
      $ref: '../../common/rest/error/responses.yml#/InternalServerError'
    Unauthorized:
      $ref: '../../common/rest/error/responses.yml#/Unauthorized'
    Forbidden:
      $ref: '../../common/rest/error/responses.yml#/Forbidden'
    TooManyRequests:
      $ref: '../../common/rest/error/responses.yml#/TooManyRequests'
