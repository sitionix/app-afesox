openapi: "3.0.0"
info:
  title: API Backend for Frontend Sitionix
  description: API specification for the BFF authentication facade
  version: 0.0.10
  contact:
    name: APP Sitionix
servers:
  - description: Localhost (dev only)
    url: 'http://localhost:8080/bffssox'
tags:
  - name: Auth
  - name: User
  - name: Site
paths:
  /api/v1/auth/refresh:
    post:
      tags:
        - Auth
      operationId: refreshAccessToken
      summary: Refresh access token
      description: >
        Issues a new short-lived access token based on a valid refresh token.
        Refresh tokens are single-use (rotation): when a refresh token is used,
        it is revoked and a new refresh token is issued.
        
        The request must include `sessionSourceId` to bind refresh to an existing device session.
        `User-Agent` is read from HTTP headers only.
      security: []  # public endpoint (no bearer auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshAccessTokenRequestDTO'
            examples:
              default:
                summary: Refresh request
                value:
                  refreshToken: dGhpc0lzUmVmcmVzaA==
                  sessionSourceId: chrome-uuid-12345
      responses:
        '200':
          description: New access token (and rotated refresh token) issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshAccessTokenResponseDTO'
        '400':
          $ref: '../../common/components.yml#/components/responses/BadRequest'
        '401':
          $ref: '../../common/components.yml#/components/responses/Unauthorized'
        '403':
          $ref: '../../common/components.yml#/components/responses/Forbidden'
        '500':
          $ref: '../../common/components.yml#/components/responses/InternalServerError'
  /api/v1/auth/email/verify:
    post:
      description: Service that verifies user's email
      summary: API for email verification
      operationId: verifyEmail
      tags:
        - Auth
      requestBody:
        description: Email verification payload
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationDTO'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationResponseDTO'
        '400':
          $ref: '../../common/components.yml#/components/responses/BadRequest'
        '500':
          $ref: '../../common/components.yml#/components/responses/InternalServerError'
  /api/v1/auth/email/verify/resend:
    post:
      description: Service that re-initiates email verification for the authenticated user.
      summary: API for resend email verification
      operationId: resendEmailVerification
      tags:
        - Auth
      security:
        - bearerAuth: []
      requestBody:
        description: Empty request body; user is resolved from the session context.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendEmailVerificationRequestDTO'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendEmailVerificationResponseDTO'
        '401':
          $ref: '../../common/components.yml#/components/responses/Unauthorized'
        '403':
          $ref: '../../common/components.yml#/components/responses/Forbidden'
        '429':
          $ref: '../../common/components.yml#/components/responses/TooManyRequests'
        '500':
          $ref: '../../common/components.yml#/components/responses/InternalServerError'
  /api/v1/users:
    post:
      description: Service that registers a new user
      summary: API for user registration
      operationId: registerUser
      tags:
        - User
      requestBody:
        description: User registration payload
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserDTO'
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseRegisterUserDTO'
        '400':
          $ref: '../../common/components.yml#/components/responses/BadRequest'
        '500':
          $ref: '../../common/components.yml#/components/responses/InternalServerError'
  /api/v1/sites:
    post:
      tags:
        - Site
      operationId: createSite
      summary: Create site
      description: >
        Creates a new site owned by the currently authenticated user.
        The site is created with `DRAFT` status and must be opened by the client in builder using returned `siteId`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSiteRequestDTO'
      responses:
        '201':
          description: Site created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSiteResponseDTO'
        '400':
          $ref: '../../common/components.yml#/components/responses/BadRequest'
        '401':
          $ref: '../../common/components.yml#/components/responses/Unauthorized'
        '403':
          $ref: '../../common/components.yml#/components/responses/Forbidden'
        '500':
          $ref: '../../common/components.yml#/components/responses/InternalServerError'

  /api/v1/auth/login:
    post:
      description: Service that authenticates user and creates a session
      summary: API for user login
      operationId: login
      tags:
        - Auth
      requestBody:
        description: Login payload
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestDTO'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponseDTO'
        '401':
          $ref: '../../common/components.yml#/components/responses/Unauthorized'
        '403':
          $ref: '../../common/components.yml#/components/responses/Forbidden'
        '500':
          $ref: '../../common/components.yml#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: User access token (Bearer).
  schemas:
    RefreshAccessTokenRequestDTO:
      type: object
      additionalProperties: false
      required:
        - refreshToken
        - sessionSourceId
      properties:
        refreshToken:
          type: string
          minLength: 1
          description: >
            Refresh token previously issued by the Authorization Service.
            Treated as single-use when rotation is enabled.
        sessionSourceId:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ".*\\S.*"
          description: >
            Opaque device/browser identifier generated by the client and persisted locally.
            Must map to an existing ACTIVE device session for this user.
    RefreshAccessTokenResponseDTO:
      type: object
      additionalProperties: false
      required:
        - accessToken
        - refreshToken
        - expiresIn
        - tokenType
      properties:
        accessToken:
          type: string
          minLength: 1
          description: Short-lived JWT access token.
        refreshToken:
          type: string
          minLength: 1
          description: Rotated refresh token (single-use).
        expiresIn:
          type: integer
          format: int64
          minimum: 1
          description: Access token TTL in seconds.
        tokenType:
          type: string
          enum: [ Bearer ]
          description: Token type (always Bearer).
    EmailVerificationResponseDTO:
      type: object
      properties:
        message:
          type: string
          example: Email verified successfully
        status:
          type: string
          enum:
            - PENDING_EMAIL_VERIFY
            - ACTIVE
            - INACTIVE
            - BANNED
    EmailVerificationDTO:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          example: verification-token-12345
        siteId:
          type: string
          format: uuid
          example: c9b1f3f4-12c7-11ec-82a8-0242ac130003
    ResendEmailVerificationRequestDTO:
      type: object
      additionalProperties: false
      description: Empty request body.
    ResendEmailVerificationResponseDTO:
      type: object
      additionalProperties: false
      required:
        - message
      properties:
        message:
          type: string
          example: If your account requires verification, an email will be sent shortly.
    ResponseRegisterUserDTO:
      type: object
      properties:
        message:
          type: string
          example: User registered successfully
        userId:
          type: integer
          format: int64
          example: 123
        status:
          type: string
          enum:
            - PENDING_EMAIL_VERIFY
            - ACTIVE
            - INACTIVE
            - BANNED
    RegisterUserDTO:
      type: object
      required:
        - email
        - role
        - password
      properties:
        password:
          type: string
          minLength: 1
          maxLength: 128
          pattern: ".*\\S.*"
          example: qwerty1234
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
          pattern: ".*\\S.*"
          example: some@sitionix.com
        siteId:
          type: string
          format: uuid
          example: c9b1f3f4-12c7-11ec-82a8-0242ac130003
        role:
          type: string
          format: enum
          enum:
              - SUPER_ADMIN
              - ECOSYSTEM_OWNER
              - SITE_ADMIN
              - SITE_USER
    CreateSiteRequestDTO:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 60
          pattern: ".*\\S.*"
          description: >
            Human-readable site name. Value is trimmed before validation.
            Duplicate names are allowed.
          example: Portfolio
        type:
          type: string
          enum:
            - PORTFOLIO
            - BUSINESS
            - BLOG
            - STORE
            - LANDING
            - OTHER
          description: Logical site category used for onboarding and analytics.
        description:
          type: string
          maxLength: 160
          description: Short site description.
        template:
          type: string
          default: BLANK
          enum:
            - BLANK
          description: Initial template identifier used during site creation.
    CreateSiteResponseDTO:
      type: object
      additionalProperties: false
      required:
        - siteId
        - name
        - status
        - createdAt
        - updatedAt
      properties:
        siteId:
          type: string
          format: uuid
          description: Globally unique site identifier.
        name:
          type: string
          description: Site name.
        status:
          type: string
          description: Current site status.
          enum:
            - DRAFT
            - PUBLISHED
            - ARCHIVED
          example: DRAFT
        createdAt:
          type: string
          format: date-time
          description: Site creation timestamp (UTC).
        updatedAt:
          type: string
          format: date-time
          description: Last site update timestamp (UTC).
    LoginRequestDTO:
      type: object
      required:
        - email
        - password
        - sessionSourceId
        - userAgent
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
          pattern: ".*\\S.*"
          example: user@example.com
        password:
          type: string
          minLength: 1
          maxLength: 128
          pattern: ".*\\S.*"
          example: StrongPassword123
        siteId:
          type: string
          format: uuid
          example: c9b1f3f4-12c7-11ec-82a8-0242ac130003
        sessionSourceId:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ".*\\S.*"
          example: chrome-uuid-12345
        userAgent:
          type: string
          example: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)...
    LoginResponseDTO:
      type: object
      required:
        - accessToken
        - refreshToken
        - expiresIn
        - tokenType
      properties:
        accessToken:
          type: string
          example: eyJhbGciOi...
        refreshToken:
          type: string
          example: dGhpc0lzUmVmcmVzaA==
        expiresIn:
          type: integer
          format: int64
          example: 3600
        tokenType:
          type: string
          example: Bearer
