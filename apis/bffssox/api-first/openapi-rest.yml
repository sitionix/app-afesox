openapi: "3.0.0"
info:
  title: API Backend for Frontend Sitionix
  description: API specification for the BFF authentication facade
  version: 0.0.4
  contact:
    name: APP Sitionix
servers:
  - description: Localhost (dev only)
    url: 'http://localhost:8080/bffssox'
tags:
  - name: Auth
  - name: User
paths:
  /api/v1/users:
    post:
      description: Service that registers a new user
      summary: API for user registration
      operationId: registerUser
      tags:
        - User
      requestBody:
        description: User registration payload
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserDTO'
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseRegisterUserDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/login:
    post:
      description: Service that authenticates user and creates a session
      summary: API for user login
      operationId: login
      tags:
        - Auth
      requestBody:
        description: Login payload
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestDTO'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponseDTO'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    ResponseRegisterUserDTO:
      type: object
      properties:
        message:
          type: string
          example: User registered successfully
        userId:
          type: integer
          format: int64
          example: 123
        status:
          type: string
          enum:
            - PENDING_EMAIL_VERIFY
            - ACTIVE
            - INACTIVE
            - BANNED
    RegisterUserDTO:
      type: object
      required:
        - email
        - siteId
        - role
        - password
      properties:
        password:
          type: string
          example: qwerty1234
        email:
          type: string
          format: email
          example: some@sitionix.com
        siteId:
          type: string
          format: uuid
          example: c9b1f3f4-12c7-11ec-82a8-0242ac130003
        role:
          type: string
          format: enum
          enum:
              - SUPER_ADMIN
              - ECOSYSTEM_OWNER
              - SITE_ADMIN
              - SITE_USER
    LoginRequestDTO:
      type: object
      required:
        - email
        - password
        - siteId
        - sessionSourceId
        - userAgent
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: StrongPassword123
        siteId:
          type: string
          format: uuid
          example: c9b1f3f4-12c7-11ec-82a8-0242ac130003
        sessionSourceId:
          type: string
          example: chrome-uuid-12345
        userAgent:
          type: string
          example: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)...
    LoginResponseDTO:
      type: object
      required:
        - accessToken
        - refreshToken
        - expiresIn
        - tokenType
      properties:
        accessToken:
          type: string
          example: eyJhbGciOi...
        refreshToken:
          type: string
          example: dGhpc0lzUmVmcmVzaA==
        expiresIn:
          type: integer
          format: int64
          example: 3600
        tokenType:
          type: string
          example: Bearer
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '../common/components.yml#/components/schemas/ErrorDTO'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '../common/components.yml#/components/schemas/ErrorDTO'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../common/components.yml#/components/schemas/ErrorDTO'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '../common/components.yml#/components/schemas/ErrorDTO'
