asyncapi: 2.0.0
info:
  title: EVENT ATHSSOX
  version: 0.0.1
  description: Dummy event for ATHSSOX

defaultContentType: application/*+avro

channels:
  athssox.${environment}.email-verify.public.v1:
    description: Email verification event topic
    parameters:
      environment:
        $ref: '#/components/parameters/environment'

    publish:
      summary: Publish email verification event
      operationId: publishEmailVerify
      tags:
        - name: EmailVerify
      bindings:
        kafka:
          bindingVersion: 'latest'
      x-itx-metadata-version: v1
      x-itx-envelop-namespace: com.app_afesox.athssox.events.emailverify
      x-itx-envelop-name: EmailVerifyEventEnvelope
      message:
        $ref: '#/components/messages/EmailVerifyEvent'

    subscribe:
      summary: Subscribe to email verification event
      operationId: subscribeEmailVerify
      tags:
        - name: EmailVerify
      bindings:
        kafka:
          bindingVersion: 'latest'
      x-itx-metadata-version: v1
      x-itx-envelop-namespace: com.app_afesox.athssox.events.emailverify
      x-itx-envelop-name: EmailVerifyEventEnvelope
      message:
        $ref: '#/components/messages/EmailVerifyEvent'
  athssox.dummy.${environment}.public.v1:
    description: Dummy event topic
    parameters:
      environment:
        $ref: '#/components/parameters/environment'

    publish:
      summary: Publish dummy event
      operationId: publishDummy
      tags:
        - name: Dummy
      bindings:
        kafka:
          bindingVersion: 'latest'
      x-itx-metadata-version: v1
      x-itx-envelop-namespace: com.app_afesox.athssox.events.dummy
      x-itx-envelop-name: DummyEventEnvelope
      message:
        $ref: '#/components/messages/DummyEvent'

    subscribe:
      summary: Subscribe to dummy event
      operationId: subscribeDummy
      tags:
        - name: Dummy
      bindings:
        kafka:
          bindingVersion: 'latest'
      x-itx-metadata-version: v1
      x-itx-envelop-namespace: com.app_afesox.athssox.events.dummy
      x-itx-envelop-name: DummyEventEnvelope
      message:
        $ref: '#/components/messages/DummyEvent'

components:
  messages:
    EmailVerifyEvent:
      name: EmailVerifyEvent
      title: Email verification event
      summary: Email verification event payload
      contentType: application/*+avro
      schemaFormat: application/vnd.apache.avro+json;version=1.0.0
      payload:
        $ref: "dummy/v1/imports/email_verify_event.avsc"
    DummyEvent:
      name: DummyEvent
      title: Dummy event
      summary: Dummy event payload
      contentType: application/*+avro
      schemaFormat: application/vnd.apache.avro+json;version=1.0.0
      payload:
        $ref: "dummy/v1/imports/dummy_event.avsc"

  parameters:
    environment:
      description: The environment identifier
      schema:
        type: string
