openapi: "3.0.0"
info:
  title: API Auth Sitionix
  description: Api specification for auth service
  version: 0.0.26
  contact:
    name: APP Sitionix
servers:
  - description: Localhost (dev only)
    url: 'http://localhost:8080/athssox'
tags:
  - name: User
  - name: Auth
  - name: Security
paths:
  /.well-known/jwks.json:
    $ref: './paths/v1/well-known-jwks-json.yml'
  /oauth2/v1/keys:
    $ref: './paths/v1/oauth2-keys.yml'
  /api/v1/auth/refresh:
    $ref: './paths/v1/auth-refresh.yml'
  /api/v1/auth/email/verify:
    $ref: './paths/v1/auth-email-verify.yml'
  /api/v1/auth/email/verify/resend:
    $ref: './paths/v1/auth-email-verify-resend.yml'
  /api/v1/auth/emailVerificationTokens/{id}:issueLink:
    $ref: './paths/v1/auth-email-verification-tokens-issue-link.yml'
  /api/v1/users:
    $ref: './paths/v1/users.yml'
  /api/v1/auth/login:
    $ref: './paths/v1/auth-login.yml'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: User access token (Bearer).
    internalBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Internal service-to-service JWT.
  schemas:
    JwksResponseDTO:
      $ref: './schemas/v1/security/jwks-response-dto.yml'
    JwkDTO:
      $ref: './schemas/v1/security/jwk-dto.yml'
    RefreshAccessTokenRequestDTO:
      $ref: './schemas/v1/auth/refresh-access-token-request-dto.yml'
    RefreshAccessTokenResponseDTO:
      $ref: './schemas/v1/auth/refresh-access-token-response-dto.yml'
    EmailVerificationResponseDTO:
      $ref: './schemas/v1/auth/email-verification-response-dto.yml'
    EmailVerificationDTO:
      $ref: './schemas/v1/auth/email-verification-dto.yml'
    ResendEmailVerificationRequestDTO:
      $ref: './schemas/v1/auth/resend-email-verification-request-dto.yml'
    ResendEmailVerificationResponseDTO:
      $ref: './schemas/v1/auth/resend-email-verification-response-dto.yml'
    IssueEmailVerificationLinkResponseDTO:
      $ref: './schemas/v1/auth/issue-email-verification-link-response-dto.yml'
    ResponseRegisterUserDTO:
      $ref: './schemas/v1/user/response-register-user-dto.yml'
    RegisterUserDTO:
      $ref: './schemas/v1/user/register-user-dto.yml'
    LoginRequestDTO:
      $ref: './schemas/v1/auth/login-request-dto.yml'
    LoginResponseDTO:
      $ref: './schemas/v1/auth/login-response-dto.yml'
    ErrorDTO:
      $ref: './schemas/v1/errors/error-dto.yml'
  responses:
    BadRequest:
      $ref: './schemas/v1/errors/responses.yml#/BadRequest'
    NotFound:
      $ref: './schemas/v1/errors/responses.yml#/NotFound'
    Conflict:
      $ref: './schemas/v1/errors/responses.yml#/Conflict'
    Gone:
      $ref: './schemas/v1/errors/responses.yml#/Gone'
    InternalServerError:
      $ref: './schemas/v1/errors/responses.yml#/InternalServerError'
    Unauthorized:
      $ref: './schemas/v1/errors/responses.yml#/Unauthorized'
    Forbidden:
      $ref: './schemas/v1/errors/responses.yml#/Forbidden'
    TooManyRequests:
      $ref: './schemas/v1/errors/responses.yml#/TooManyRequests'
