title: RefreshAccessTokenResponseDTO
type: object
additionalProperties: false
required:
  - accessToken
  - refreshToken
  - expiresIn
  - tokenType
properties:
  accessToken:
    type: string
    minLength: 1
    description: Short-lived JWT access token.
  refreshToken:
    type: string
    minLength: 1
    description: Rotated refresh token (single-use).
  expiresIn:
    type: integer
    format: int64
    minimum: 1
    description: Access token TTL in seconds.
  tokenType:
    type: string
    enum: [ Bearer ]
    description: Token type (always Bearer).
