openapi: "3.0.0"
info:
  title: API Auth Sitionix
  description: Api specification for auth service
  version: 0.0.20
  contact:
    name: APP Sitionix
servers:
  - description: Localhost (dev only)
    url: 'http://localhost:8080/athssox'
tags:
  - name: User
  - name: Auth
paths:
  /api/v1/auth/refresh:
    post:
      tags:
        - Auth
      operationId: refreshAccessToken
      summary: Refresh access token
      description: >
        Issues a new short-lived access token based on a valid refresh token.
        Refresh tokens are single-use (rotation): when a refresh token is used,
        it is revoked and a new refresh token is issued.
        
        The request must include `sessionSourceId` to bind refresh to an existing device session.
        `User-Agent` is read from HTTP headers only.
      security: []  # public endpoint (no bearer auth)
      parameters:
        - name: User-Agent
          in: header
          required: true
          description: Raw User-Agent string. Must be provided via HTTP header only.
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshAccessTokenRequest'
            examples:
              default:
                summary: Refresh request
                value:
                  refreshToken: dGhpc0lzUmVmcmVzaA==
                  sessionSourceId: chrome-uuid-12345
      responses:
        '200':
          description: New access token (and rotated refresh token) issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshAccessTokenResponse'
        '400':
          $ref: '../../common/components.yml#/components/responses/BadRequest'
        '401':
          $ref: '../../common/components.yml#/components/responses/Unauthorized'
        '403':
          $ref: '../../common/components.yml#/components/responses/Forbidden'
        '500':
          $ref: '../../common/components.yml#/components/responses/InternalServerError'
  /api/v1/auth/email/verify:
    post:
      description: Service that verifies user's email
      summary: API for email verification
      operationId: verifyEmail
      tags:
          - Auth
      requestBody:
        description: Email verification payload
        required: true
        content:
          application/json:
            schema:
                $ref: '#/components/schemas/EmailVerificationDTO'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationResponseDTO'
        '400':
          $ref: '../../common/components.yml#/components/responses/BadRequest'
        '500':
          $ref: '../../common/components.yml#/components/responses/InternalServerError'
  /api/v1/users:
    post:
      description: Service that registers a new user
      summary: API for user registration
      operationId: registerUser
      tags:
        - User
      requestBody:
        description: User registration payload
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserDTO'
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseRegisterUserDTO'
        '400':
          $ref: '../../common/components.yml#/components/responses/BadRequest'
        '500':
          $ref: '../../common/components.yml#/components/responses/InternalServerError'

  /api/v1/auth/login:
    post:
      description: Service that authenticates user and creates a session
      summary: API for user login
      operationId: login
      tags:
        - Auth
      requestBody:
        description: Login payload
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestDTO'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponseDTO'
        '400':
          $ref: '../../common/components.yml#/components/responses/BadRequest'
        '401':
          $ref: '../../common/components.yml#/components/responses/Unauthorized'
        '403':
          $ref: '../../common/components.yml#/components/responses/Forbidden'
        '500':
          $ref: '../../common/components.yml#/components/responses/InternalServerError'

components:
  schemas:
    RefreshAccessTokenRequest:
      type: object
      additionalProperties: false
      required:
        - refreshToken
        - sessionSourceId
      properties:
        refreshToken:
          type: string
          minLength: 1
          description: >
            Refresh token previously issued by the Authorization Service.
            Treated as single-use when rotation is enabled.
        sessionSourceId:
          type: string
          minLength: 1
          description: >
            Opaque device/browser identifier generated by the client and persisted locally.
            Must map to an existing ACTIVE device session for this user.
    RefreshAccessTokenResponse:
      type: object
      additionalProperties: false
      required:
        - accessToken
        - refreshToken
        - expiresIn
        - tokenType
      properties:
        accessToken:
          type: string
          minLength: 1
          description: Short-lived JWT access token.
        refreshToken:
          type: string
          minLength: 1
          description: Rotated refresh token (single-use).
        expiresIn:
          type: integer
          format: int64
          minimum: 1
          description: Access token TTL in seconds.
        tokenType:
          type: string
          enum: [ Bearer ]
          description: Token type (always Bearer).
    EmailVerificationResponseDTO:
      type: object
      properties:
        message:
          type: string
          example: Email verified successfully
        status:
          type: string
          enum:
            - PENDING_EMAIL_VERIFY
            - ACTIVE
            - INACTIVE
            - BANNED
    EmailVerificationDTO:
      type: object
      required:
          - token
      properties:
        token:
          type: string
          example: verification-token-12345
        siteId:
          type: string
          format: uuid
          example: c9b1f3f4-12c7-11ec-82a8-0242ac130003
    ResponseRegisterUserDTO:
      type: object
      properties:
        message:
          type: string
          example: User registered successfully
        userId:
          type: integer
          format: int64
          example: 123
        status:
          type: string
          enum:
            - PENDING_EMAIL_VERIFY
            - ACTIVE
            - INACTIVE
            - BANNED
    RegisterUserDTO:
      type: object
      required:
        - email
        - role
        - password
      properties:
        password:
          type: string
          example: qwerty1234
        email:
          type: string
          format: email
          example: some@sitionix.com
        siteId:
          type: string
          format: uuid
          example: c9b1f3f4-12c7-11ec-82a8-0242ac130003
        role:
          type: string
          format: enum
          enum:
              - SUPER_ADMIN
              - ECOSYSTEM_OWNER
              - SITE_ADMIN
              - SITE_USER
    LoginRequestDTO:
      type: object
      required:
        - email
        - password
        - sessionSourceId
        - userAgent
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: StrongPassword123
        siteId:
          type: string
          format: uuid
          example: c9b1f3f4-12c7-11ec-82a8-0242ac130003
        sessionSourceId:
          type: string
          example: chrome-uuid-12345
        userAgent:
          type: string
          example: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)...
    LoginResponseDTO:
      type: object
      required:
        - accessToken
        - refreshToken
        - tokenType
        - expiresIn
      properties:
        accessToken:
          type: string
          description: Bearer token that authorizes subsequent requests
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
        refreshToken:
          type: string
          description: Token used to refresh the access token
          example: dGhpc0lzUmVmcmVzaA==
        tokenType:
          type: string
          description: Type of token returned
          example: Bearer
        expiresIn:
          type: integer
          format: int64
          description: Time in seconds until the token expires
          example: 3600
