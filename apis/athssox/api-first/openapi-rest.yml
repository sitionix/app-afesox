openapi: "3.0.0"
info:
  title: API Auth Sitionix
  description: Api specification for auth service
  version: 0.0.24
  contact:
    name: APP Sitionix
servers:
  - description: Localhost (dev only)
    url: 'http://localhost:8080/athssox'
tags:
  - name: User
  - name: Auth
  - name: Security
paths:
  /.well-known/jwks.json:
    get:
      tags:
        - Security
      operationId: getJwksCanonical
      summary: Public JSON Web Key Set (canonical)
      description: >
        Returns a JSON Web Key Set containing public keys used to verify JWT signatures.
        Used by OAuth2/OIDC resource servers.
        Keys are selected via JWT header `kid` value.
        This endpoint is public; no authentication is required and it does not return 401/403.

        Clients may cache JWKS for up to 300 seconds to reduce load.
        Rotation strategy relies on `kid` plus the cache TTL.
      security: []  # public endpoint (no bearer auth)
      responses:
        '200':
          description: JWKS returned
          headers:
            Cache-Control:
              description: Clients may cache the JWKS for up to 300 seconds to reduce load.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwksResponse'
        '500':
          $ref: '../../common/components.yml#/components/responses/InternalServerError'
  /oauth2/v1/keys:
    get:
      tags:
        - Security
      operationId: getJwksAlias
      summary: Public JSON Web Key Set (enterprise alias)
      description: >
        Enterprise alias for /.well-known/jwks.json.
        Payload is identical.
        Returns a JSON Web Key Set containing public keys used to verify JWT signatures.
        Used by OAuth2/OIDC resource servers.
        Keys are selected via JWT header `kid` value.

        This endpoint is public; no authentication is required and it does not return 401/403.

        Clients may cache JWKS for up to 300 seconds to reduce load.
        Rotation strategy relies on `kid` plus the cache TTL.
      security: []  # public endpoint (no bearer auth)
      responses:
        '200':
          description: JWKS returned
          headers:
            Cache-Control:
              description: Clients may cache the JWKS for up to 300 seconds to reduce load.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwksResponse'
        '500':
          $ref: '../../common/components.yml#/components/responses/InternalServerError'
  /api/v1/auth/refresh:
    post:
      tags:
        - Auth
      operationId: refreshAccessToken
      summary: Refresh access token
      description: >
        Issues a new short-lived access token based on a valid refresh token.
        Refresh tokens are single-use (rotation): when a refresh token is used,
        it is revoked and a new refresh token is issued.
        
        The request must include `sessionSourceId` to bind refresh to an existing device session.
        `User-Agent` is read from HTTP headers only.
      security: []  # public endpoint (no bearer auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshAccessTokenRequestDTO'
            examples:
              default:
                summary: Refresh request
                value:
                  refreshToken: dGhpc0lzUmVmcmVzaA==
                  sessionSourceId: chrome-uuid-12345
      responses:
        '200':
          description: New access token (and rotated refresh token) issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshAccessTokenResponseDTO'
        '400':
          $ref: '../../common/components.yml#/components/responses/BadRequest'
        '401':
          $ref: '../../common/components.yml#/components/responses/Unauthorized'
        '403':
          $ref: '../../common/components.yml#/components/responses/Forbidden'
        '500':
          $ref: '../../common/components.yml#/components/responses/InternalServerError'
  /api/v1/auth/email/verify:
    post:
      description: Service that verifies user's email
      summary: API for email verification
      operationId: verifyEmail
      tags:
          - Auth
      requestBody:
        description: Email verification payload
        required: true
        content:
          application/json:
            schema:
                $ref: '#/components/schemas/EmailVerificationDTO'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationResponseDTO'
        '400':
          $ref: '../../common/components.yml#/components/responses/BadRequest'
        '500':
          $ref: '../../common/components.yml#/components/responses/InternalServerError'
  /api/v1/auth/emailVerificationTokens/{id}:issueLink:
    get:
      description: Issues a verification link for the provided email verification token id.
      summary: Issue email verification link
      operationId: issueEmailVerificationLink
      tags:
        - Auth
      security:
        - internalBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Email verification token identifier.
          schema:
            type: string
            format: uuid
          example: 2f6a6c3c-8b0f-4f58-9c18-2a7d9c889a4f
        - name: pepper
          in: query
          required: true
          description: Pepper UUID associated with the email verification token.
          schema:
              type: string
              format: uuid
          example: d290f1ee-6c54-4b01-90e6-d701748f0851
      responses:
        '200':
          description: Verification link issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueEmailVerificationLinkResponseDTO'
        '400':
          $ref: '../../common/components.yml#/components/responses/BadRequest'
        '404':
          $ref: '../../common/components.yml#/components/responses/NotFound'
        '409':
          $ref: '../../common/components.yml#/components/responses/Conflict'
        '410':
          $ref: '../../common/components.yml#/components/responses/Gone'
        '500':
          $ref: '../../common/components.yml#/components/responses/InternalServerError'
  /api/v1/users:
    post:
      description: Service that registers a new user
      summary: API for user registration
      operationId: registerUser
      tags:
        - User
      requestBody:
        description: User registration payload
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserDTO'
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseRegisterUserDTO'
        '400':
          $ref: '../../common/components.yml#/components/responses/BadRequest'
        '500':
          $ref: '../../common/components.yml#/components/responses/InternalServerError'

  /api/v1/auth/login:
    post:
      description: Service that authenticates user and creates a session
      summary: API for user login
      operationId: login
      tags:
        - Auth
      requestBody:
        description: Login payload
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestDTO'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponseDTO'
        '400':
          $ref: '../../common/components.yml#/components/responses/BadRequest'
        '401':
          $ref: '../../common/components.yml#/components/responses/Unauthorized'
        '403':
          $ref: '../../common/components.yml#/components/responses/Forbidden'
        '500':
          $ref: '../../common/components.yml#/components/responses/InternalServerError'

components:
  securitySchemes:
    internalBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Internal service-to-service JWT.
  schemas:
    JwksResponse:
      type: object
      required:
        - keys
      properties:
        keys:
          type: array
          description: List of public JSON Web Keys (JWK).
          items:
            $ref: '#/components/schemas/Jwk'
    Jwk:
      type: object
      required:
        - kty
        - kid
        - use
        - alg
      properties:
        kty:
          type: string
          description: Key Type, for example "RSA" or "EC".
        kid:
          type: string
          description: Key ID. Used to match JWT header "kid" to the correct public key.
        use:
          type: string
          description: Public key usage. Usually "sig" (signature verification).
        alg:
          type: string
          description: Algorithm intended for use with this key, e.g. "RS256" or "ES256".
        n:
          type: string
          description: RSA modulus (Base64URL-encoded).
        e:
          type: string
          description: RSA public exponent (Base64URL-encoded). Usually "AQAB".
    RefreshAccessTokenRequestDTO:
      type: object
      additionalProperties: false
      required:
        - refreshToken
        - sessionSourceId
      properties:
        refreshToken:
          type: string
          minLength: 1
          description: >
            Refresh token previously issued by the Authorization Service.
            Treated as single-use when rotation is enabled.
        sessionSourceId:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ".*\\S.*"
          description: >
            Opaque device/browser identifier generated by the client and persisted locally.
            Must map to an existing ACTIVE device session for this user.
    RefreshAccessTokenResponseDTO:
      type: object
      additionalProperties: false
      required:
        - accessToken
        - refreshToken
        - expiresIn
        - tokenType
      properties:
        accessToken:
          type: string
          minLength: 1
          description: Short-lived JWT access token.
        refreshToken:
          type: string
          minLength: 1
          description: Rotated refresh token (single-use).
        expiresIn:
          type: integer
          format: int64
          minimum: 1
          description: Access token TTL in seconds.
        tokenType:
          type: string
          enum: [ Bearer ]
          description: Token type (always Bearer).
    EmailVerificationResponseDTO:
      type: object
      properties:
        message:
          type: string
          example: Email verified successfully
        status:
          type: string
          enum:
            - PENDING_EMAIL_VERIFY
            - ACTIVE
            - INACTIVE
            - BANNED
    EmailVerificationDTO:
      type: object
      required:
          - token
      properties:
        token:
          type: string
          example: verification-token-12345
        siteId:
          type: string
          format: uuid
          example: c9b1f3f4-12c7-11ec-82a8-0242ac130003
    IssueEmailVerificationLinkResponseDTO:
      type: object
      required:
        - verifyUrl
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
        expiresAt:
          type: string
          format: date-time
          example: 2024-07-18T12:34:56Z
        tokenId:
          type: string
          format: uuid
          example: 2f6a6c3c-8b0f-4f58-9c18-2a7d9c889a4f
        siteId:
          type: string
          format: uuid
          example: 2f6a6c3c-8b0f-4f58-9c18-2a7d9c889a4f
    ResponseRegisterUserDTO:
      type: object
      properties:
        message:
          type: string
          example: User registered successfully
        userId:
          type: integer
          format: int64
          example: 123
        status:
          type: string
          enum:
            - PENDING_EMAIL_VERIFY
            - ACTIVE
            - INACTIVE
            - BANNED
    RegisterUserDTO:
      type: object
      required:
        - email
        - role
        - password
      properties:
        password:
          type: string
          minLength: 1
          maxLength: 128
          pattern: ".*\\S.*"
          example: qwerty1234
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
          pattern: ".*\\S.*"
          example: some@sitionix.com
        siteId:
          type: string
          format: uuid
          example: c9b1f3f4-12c7-11ec-82a8-0242ac130003
        role:
          type: string
          format: enum
          enum:
              - SUPER_ADMIN
              - ECOSYSTEM_OWNER
              - SITE_ADMIN
              - SITE_USER
    LoginRequestDTO:
      type: object
      required:
        - email
        - password
        - sessionSourceId
        - userAgent
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
          pattern: ".*\\S.*"
          example: user@example.com
        password:
          type: string
          minLength: 1
          maxLength: 128
          pattern: ".*\\S.*"
          example: StrongPassword123
        siteId:
          type: string
          format: uuid
          example: c9b1f3f4-12c7-11ec-82a8-0242ac130003
        sessionSourceId:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ".*\\S.*"
          example: chrome-uuid-12345
        userAgent:
          type: string
          example: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)...
    LoginResponseDTO:
      type: object
      required:
        - accessToken
        - refreshToken
        - tokenType
        - expiresIn
      properties:
        accessToken:
          type: string
          description: Bearer token that authorizes subsequent requests
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
        refreshToken:
          type: string
          description: Token used to refresh the access token
          example: dGhpc0lzUmVmcmVzaA==
        tokenType:
          type: string
          description: Type of token returned
          example: Bearer
        expiresIn:
          type: integer
          format: int64
          description: Time in seconds until the token expires
          example: 3600
